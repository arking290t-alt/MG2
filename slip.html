<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip Management Hub</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
      authDomain: "mg-manager-3ab66.firebaseapp.com",
      projectId: "mg-manager-3ab66",
      storageBucket: "mg-manager-3ab66.firebasestorage.app",
      messagingSenderId: "330667005987",
      appId: "1:330667005987:web:95de27b6259ace9fc6b996",
      measurementId: "G-05HW0KSN38"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let cachedSlipsArray = [];
    let selectedActiveSlipForPrint = null;
    let gridSelection = [true, false, false, false];

    document.addEventListener("DOMContentLoaded", () => {
      const dateEl = document.getElementById('date');
      if (dateEl) dateEl.value = new Date().toISOString().split('T')[0];

      const form = document.getElementById('slipForm');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          const targetSlip = {
            name: document.getElementById('name').value,
            item: document.getElementById('item').value,
            description: document.getElementById('description').value || '',
            amount: document.getElementById('amount').value,
            date: document.getElementById('date').value,
            timestamp: Date.now()
          };

          addDoc(collection(db, 'slips'), targetSlip)
            .then(() => {
              document.getElementById('name').value = '';
              document.getElementById('item').value = '';
              document.getElementById('description').value = '';
              document.getElementById('amount').value = '';
              document.getElementById('date').value = new Date().toISOString().split('T')[0];
              alert('Saved successfully!');
            })
            .catch(err => alert('Firestore Save Error: ' + err.message));
        });
      }

      document.getElementById('preview-modal').addEventListener('click', function(e) {
        if (e.target === this) closePrintModal();
      });

      initDatabaseListeners();
    });

    window.openWorkspace = function(workspaceId) {
      document.getElementById('landingMenu').style.display = 'none';
      document.querySelectorAll('.workspace-panel').forEach(el => el.style.display = 'none');
      document.getElementById(workspaceId).style.display = 'block';
    }

    window.showLandingMenu = function() {
      document.querySelectorAll('.workspace-panel').forEach(el => el.style.display = 'none');
      document.getElementById('landingMenu').style.display = 'block';
    }

    function initDatabaseListeners() {
      const sortedQuery = query(collection(db, 'slips'), orderBy('timestamp', 'desc'));
      onSnapshot(sortedQuery, (snapshot) => {
        const records = [];
        snapshot.forEach((doc) => records.push({ id: doc.id, ...doc.data() }));
        cachedSlipsArray = records;
        renderRecentFeed(cachedSlipsArray.slice(0, 5));
        renderViewTabFeed(cachedSlipsArray);
      });
    }

    function renderRecentFeed(items) {
      const target = document.getElementById('recentSlipsContainer');
      if (!target) return;
      target.innerHTML = items.length === 0 ? "<p class='empty-text'>No records found.</p>" : items.map(x => generateSlipMarkupRow(x)).join('');
    }

    function renderViewTabFeed(items) {
      const target = document.getElementById('allSlipsContainer');
      if (!target) return;
      target.innerHTML = items.length === 0 ? "<p class='empty-text'>No records found.</p>" : items.map(x => generateSlipMarkupRow(x)).join('');
    }

    function generateSlipMarkupRow(item) {
      return `
        <div class="slip-item">
          <div class="slip-info">
            <div class="slip-title-line">${item.name} <span class="slip-item-name">— ${item.item}</span></div>
            <div class="slip-meta-line">Date: ${item.date} | Total: <strong class="glow-text">$${parseFloat(item.amount).toFixed(2)}</strong></div>
          </div>
          <div style="display:flex; gap: 8px; margin-top: 10px;">
            <button class="btn-print-small" onclick='openPrintModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Preview & Print</button>
            <button class="btn-share-small" onclick='generatePngAndShare(${JSON.stringify(item).replace(/'/g, "&apos;")})'>WhatsApp Share</button>
          </div>
        </div>
      `;
    }

    window.filterAllSlips = function() {
      const textTerm = document.getElementById('searchBar').value.toLowerCase().trim();
      const filterDate = document.getElementById('filterDate').value;
      
      let filtered = cachedSlipsArray;

      if (filterDate) {
        filtered = filtered.filter(x => x.date === filterDate);
      }
      if (textTerm) {
        filtered = filtered.filter(x => 
          x.name.toLowerCase().includes(textTerm) || 
          x.item.toLowerCase().includes(textTerm)
        );
      }
      renderViewTabFeed(filtered);
    }

    window.clearFilters = function() {
      document.getElementById('searchBar').value = '';
      document.getElementById('filterDate').value = '';
      renderViewTabFeed(cachedSlipsArray);
    }

    window.openPrintModal = function(slipObj) {
      selectedActiveSlipForPrint = slipObj;
      gridSelection = [true, false, false, false]; 
      renderGridOptions();
      document.getElementById('preview-modal').style.display = 'flex';
    }

    function renderGridOptions() {
      const container = document.getElementById('grid-selector-container');
      container.innerHTML = `
        <div style="margin-bottom:10px; font-size:12px; color:var(--text-muted); font-weight: 600;">SELECT QUARTER BOX POSITIONS TO PRINT:</div>
        <div class="a4-preview-grid">
          <div class="grid-box ${gridSelection[0] ? 'active' : ''}" onclick="toggleGridBox(0)">Box 1 (Top-Left)</div>
          <div class="grid-box ${gridSelection[1] ? 'active' : ''}" onclick="toggleGridBox(1)">Box 2 (Top-Right)</div>
          <div class="grid-box ${gridSelection[2] ? 'active' : ''}" onclick="toggleGridBox(2)">Box 3 (Bottom-Left)</div>
          <div class="grid-box ${gridSelection[3] ? 'active' : ''}" onclick="toggleGridBox(3)">Box 4 (Bottom-Right)</div>
        </div>
      `;
    }

    window.toggleGridBox = function(index) {
      gridSelection[index] = !gridSelection[index];
      renderGridOptions();
    }

    window.closePrintModal = function() {
      document.getElementById('preview-modal').style.display = 'none';
      selectedActiveSlipForPrint = null;
    }

    window.executeSystemPrint = function() {
      if(!selectedActiveSlipForPrint) return;
      const printArea = document.getElementById('print-area');
      printArea.innerHTML = ''; 

      for(let i = 0; i < 4; i++) {
        if(gridSelection[i]) {
          printArea.innerHTML += `
            <div class="print-slot filled-slot">
              <div class="print-header">RECEIPT SLIP</div>
              <div class="print-row"><span class="print-label">Date:</span> <span>${selectedActiveSlipForPrint.date}</span></div>
              <div class="print-row"><span class="print-label">Name:</span> <span>${selectedActiveSlipForPrint.name}</span></div>
              <div class="print-row"><span class="print-label">Item:</span> <span>${selectedActiveSlipForPrint.item}</span></div>
              <div class="print-row"><span class="print-label">Description:</span> <span>${selectedActiveSlipForPrint.description || 'N/A'}</span></div>
              <div class="print-row total-row">
                <span class="print-label">Total Amount:</span>
                <span>$${parseFloat(selectedActiveSlipForPrint.amount).toFixed(2)}</span>
              </div>
            </div>
          `;
        } else {
          printArea.innerHTML += `<div class="print-slot empty-slot"></div>`;
        }
      }

      window.print();
      closePrintModal();
    }

    // Dynamic PNG Image Generation and File Sharing API Engine
    window.generatePngAndShare = function(slipObj) {
      // 1. Temporarily populate a clean hidden container styled for the image receipt look
      const generatorContainer = document.getElementById('share-generator-buffer');
      generatorContainer.innerHTML = `
        <div class="image-receipt-card">
          <div class="receipt-header">RECEIPT INVOICE</div>
          <div class="receipt-row"><span>Date:</span> <strong>${slipObj.date}</strong></div>
          <div class="receipt-row"><span>Customer:</span> <strong>${slipObj.name}</strong></div>
          <div class="receipt-row"><span>Item Name:</span> <strong>${slipObj.item}</strong></div>
          <div class="receipt-row"><span>Details:</span> <strong>${slipObj.description || 'N/A'}</strong></div>
          <div class="receipt-total">
            <span>TOTAL DUE:</span>
            <span>$${parseFloat(slipObj.amount).toFixed(2)}</span>
          </div>
        </div>
      `;
      generatorContainer.style.display = 'block';

      // 2. Render container structural layout into a raw blob canvas image object
      html2canvas(generatorContainer.querySelector('.image-receipt-card'), {
        scale: 2, // Enhanced high-density display pixel generation
        backgroundColor: '#ffffff'
      }).then(canvas => {
        generatorContainer.style.display = 'none'; // Clear buffer views away
        
        canvas.toBlob(blob => {
          const imageFile = new File([blob], `slip-${slipObj.timestamp}.png`, { type: 'image/png' });
          
          // Check if system native navigator asset share protocols are available (Mobile phones / Modern tablets)
          if (navigator.canShare && navigator.canShare({ files: [imageFile] })) {
            navigator.share({
              files: [imageFile],
              title: 'Receipt Slip Download',
              text: `Slip invoice for ${slipObj.name}`
            }).catch(err => console.log('Share canceled or failed', err));
          } else {
            // Desktop fallback: Instantly trigger an automated background file download link
            const fallbackLink = document.createElement('a');
            fallbackLink.download = `slip-${slipObj.timestamp}.png`;
            fallbackLink.href = canvas.toDataURL('image/png');
            fallbackLink.click();
            alert('Image saved to device downloads! You can now send it to your chat contacts.');
          }
        }, 'image/png');
      });
    }
  </script>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
      --panel-bg: rgba(17, 24, 39, 0.95);
      --primary-cyan: #00f2fe;
      --accent-bloom: #00c6ff;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.12);
      --radius: 16px;
      --shadow-md: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      margin: 0; padding: 15px;
      color: var(--text-main);
      min-height: 100vh;
      box-sizing: border-box;
    }

    .main-container { max-width: 600px; width: 100%; margin: 0 auto; padding-bottom: 80px; }
    .menu-selection { display: block; margin-top: 20px; }
    
    .option-card {
      background: var(--panel-bg);
      padding: 30px 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      text-align: center;
      cursor: pointer;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
    }

    .option-card:hover { border-color: var(--primary-cyan); }
    .option-card h2 { color: #ffffff; font-size: 22px; margin: 0 0 10px 0; }
    .option-card p { color: var(--text-muted); font-size: 13px; margin: 0; }

    .workspace-panel {
      display: none;
      background: var(--panel-bg);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .panel-header h1 { margin: 0; font-size: 22px; color: #ffffff; }

    .btn-back {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .form-group { display: block; margin-bottom: 15px; width: 100%; }
    
    label {
      display: block; margin-bottom: 6px; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
    }
    
    input, textarea {
      display: block; width: 100%; padding: 12px;
      border: 1px solid var(--border-color); border-radius: 10px;
      box-sizing: border-box; font-size: 15px;
      background: rgba(255, 255, 255, 0.03); color: #ffffff;
    }

    textarea { height: 75px; resize: none; }
    
    button.btn-action {
      display: block; background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--accent-bloom) 100%);
      color: #0b0f19; padding: 14px; font-size: 16px; border: none;
      border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%;
      margin-top: 20px;
    }

    .section-title {
      margin-top: 30px; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: var(--primary-cyan);
      padding-bottom: 8px; border-bottom: 1px solid var(--border-color);
    }

    .slip-list { margin-top: 15px; }

    .slip-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 15px; border-radius: var(--radius); margin-bottom: 12px;
    }

    .slip-title-line { font-weight: 700; font-size: 15px; color: #ffffff; }
    .slip-item-name { color: var(--text-muted); font-size: 13px; }
    .slip-meta-line { color: var(--text-muted); font-size: 12px; margin-top: 5px; }
    .glow-text { color: var(--primary-cyan); }
    .empty-text { color: var(--text-muted); text-align: center; font-size: 14px; }
    
    .btn-print-small, .btn-share-small {
      flex: 1; padding: 10px; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 13px; text-align: center;
    }
    .btn-print-small { background: rgba(0, 242, 254, 0.06); color: var(--primary-cyan); border: 1px solid rgba(0, 242, 254, 0.2); }
    .btn-share-small { background: rgba(37, 211, 102, 0.08); color: #25D366; border: 1px solid rgba(37, 211, 102, 0.2); }

    .a4-preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 90px 90px;
      gap: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: #1f2937;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .grid-box {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .grid-box.active {
      background: rgba(0, 242, 254, 0.15);
      border-color: var(--primary-cyan);
      color: var(--primary-cyan);
    }

    #preview-modal {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(8px);
      z-index: 1000; justify-content: center; align-items: center; padding: 15px;
    }

    .modal-body {
      background: #111827; border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 20px; border-radius: var(--radius); width: 100%; max-width: 400px;
    }

    .modal-buttons { display: flex; gap: 10px; }
    
    .modal-btn {
      flex: 1; padding: 12px; border: none;
      border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px;
    }
    .btn-confirm { background: var(--primary-cyan); color: #0b0f19; }
    .btn-cancel { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--border-color); }

    #print-area { display: none; }

    /* Hidden Image Rendering Target Styles */
    #share-generator-buffer {
      position: absolute;
      left: -9999px;
      top: -9999px;
      display: none;
    }

    .image-receipt-card {
      width: 380px;
      background: #ffffff !important;
      color: #000000 !important;
      padding: 25px;
      font-family: 'Arial', sans-serif;
      border: 4px double #000000;
      box-sizing: border-box;
    }

    .receipt-header {
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
      border-bottom: 3px solid #000000;
      padding-bottom: 8px;
      margin-bottom: 20px;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 12px;
      border-bottom: 1px dashed #dddddd;
      padding-bottom: 4px;
    }

    .receipt-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 900;
      border-top: 3px solid #000000;
      padding-top: 10px;
      margin-top: 20px;
    }

    /* ================= VERTICAL 1/4 A4 PRINT SYSTEM ENGINE ================= */
    @page { size: portrait; margin: 0; }

    @media print {
      body, html, .main-container, #preview-modal, #share-generator-buffer {
        display: none !important;
        visibility: hidden !important;
      }
      
      #print-area {
        display: grid !important;
        visibility: visible !important;
        position: absolute; left: 0; top: 0;
        width: 210mm; height: 297mm;
        grid-template-columns: 105mm 105mm;
        grid-template-rows: 148.5mm 148.5mm;
        background: #ffffff !important;
        padding: 0; margin: 0;
        box-sizing: border-box;
      }
      
      .print-slot {
        width: 105mm; height: 148.5mm;
        box-sizing: border-box;
        border: 1px dashed #dddddd; 
        position: relative;
        overflow: hidden;
      }

      .empty-slot { visibility: hidden !important; }

      .filled-slot {
        padding: 15mm;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        background: #ffffff !important;
        color: #000000 !important;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      
      .print-header {
        text-align: center; font-weight: 800; font-size: 16px;
        border-bottom: 2px solid #000000; padding-bottom: 6px; margin-bottom: 20px;
        color: #000000 !important;
      }

      .print-row {
        display: flex !important; justify-content: space-between !important;
        font-size: 13px; margin-bottom: 10px; color: #000000 !important;
      }

      .print-label { font-weight: 700; }

      .filled-slot .total-row {
        border-top: 2px dashed #000000; padding-top: 12px;
        margin-top: auto; font-size: 15px; font-weight: 800;
        color: #000000 !important;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">
    
    <div id="landingMenu" class="menu-selection">
      <div class="option-card" onclick="openWorkspace('createWorkspace')">
        <h2>Create Slip</h2>
        <p>Log a new receipt record seamlessly to the cloud database</p>
      </div>
      <div class="option-card" onclick="openWorkspace('viewWorkspace')">
        <h2>View Slips</h2>
        <p>Dynamic date filtering, keyword logs, and vertical A4 1/4 grid printing</p>
      </div>
    </div>

    <div id="createWorkspace" class="workspace-panel">
      <div class="panel-header">
        <h1>Create New Slip</h1>
        <button class="btn-back" onclick="showLandingMenu()">Back</button>
      </div>
      
      <form id="slipForm">
        <div class="form-group"><label for="name">Name</label><input type="text" id="name" required placeholder="Customer Name"></div>
        <div class="form-group"><label for="item">Item</label><input type="text" id="item" required placeholder="Item Title"></div>
        <div class="form-group"><label for="description">Description</label><textarea id="description" placeholder="Extra information..."></textarea></div>
        <div class="form-group"><label for="amount">Amount ($)</label><input type="number" id="amount" step="0.01" required placeholder="0.00"></div>
        <div class="form-group"><label for="date">Date</label><input type="date" id="date" required></div>
        <button type="submit" class="btn-action">Save to Database</button>
      </form>

      <div class="section-title">Recent 5 Slips</div>
      <div id="recentSlipsContainer" class="slip-list">Syncing cloud records...</div>
    </div>

    <div id="viewWorkspace" class="workspace-panel">
      <div class="panel-header">
        <h1>Search & View Logs</h1>
        <button class="btn-back" onclick="showLandingMenu()">Back</button>
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; border: 1px solid var(--border-color);">
        <div>
          <label for="searchBar">Text Filter (Name / Item)</label>
          <input type="text" id="searchBar" placeholder="Type keyword..." oninput="filterAllSlips()">
        </div>
        <div>
          <label for="filterDate">Target Date Filter</label>
          <input type="date" id="filterDate" onchange="filterAllSlips()">
        </div>
        <button onclick="clearFilters()" style="background: rgba(255,255,255,0.05); color:#ffffff; border:1px solid var(--border-color); padding:8px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;">Reset Filters</button>
      </div>
      
      <div class="section-title">All Registered Logs</div>
      <div id="allSlipsContainer" class="slip-list">Syncing cloud data stream...</div>
    </div>

  </div>

  <div id="preview-modal">
    <div class="modal-body">
      <div id="grid-selector-container"></div>
      
      <div class="modal-buttons">
        <button class="modal-btn btn-cancel" onclick="closePrintModal()">Cancel</button>
        <button class="modal-btn btn-confirm" onclick="executeSystemPrint()">Execute Print</button>
      </div>
    </div>
  </div>

  <div id="share-generator-buffer"></div>
  <div id="print-area"></div>

</body>
</html>
