<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip Management Hub</title>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Your exact Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
      authDomain: "mg-manager-3ab66.firebaseapp.com",
      projectId: "mg-manager-3ab66",
      storageBucket: "mg-manager-3ab66.firebasestorage.app",
      messagingSenderId: "330667005987",
      appId: "1:330667005987:web:95de27b6259ace9fc6b996",
      measurementId: "G-05HW0KSN38"
    };

    // Initialize Firebase Services
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let cachedSlipsArray = [];
    let selectedActiveSlipForPrint = null;

    // Load initial listeners and set input default date
    document.addEventListener("DOMContentLoaded", () => {
      const dateEl = document.getElementById('date');
      if (dateEl) {
        dateEl.value = new Date().toISOString().split('T')[0];
      }
      initDatabaseListeners();
    });

    // Make navigation functions globally accessible from modular script
    window.openWorkspace = function(workspaceId) {
      document.getElementById('landingMenu').style.display = 'none';
      document.querySelectorAll('.workspace-panel').forEach(el => el.style.display = 'none');
      document.getElementById(workspaceId).style.display = 'block';
      window.scrollTo(0, 0); // Reset scroll to top
    }

    window.showLandingMenu = function() {
      document.querySelectorAll('.workspace-panel').forEach(el => el.style.display = 'none');
      document.getElementById('landingMenu').style.display = 'grid';
      window.scrollTo(0, 0);
    }

    // Capture Submit Action
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById('slipForm');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const targetSlip = {
            name: document.getElementById('name').value,
            item: document.getElementById('item').value,
            description: document.getElementById('description').value,
            amount: document.getElementById('amount').value,
            date: document.getElementById('date').value,
            timestamp: Date.now()
          };

          const slipsRef = ref(database, 'slips');
          const newSlipRef = push(slipsRef);
          
          set(newSlipRef, targetSlip)
            .then(() => {
              // Reset values instead of hard form structural reload
              document.getElementById('name').value = '';
              document.getElementById('item').value = '';
              document.getElementById('description').value = '';
              document.getElementById('amount').value = '';
              document.getElementById('date').value = new Date().toISOString().split('T')[0];
              
              alert('Saved successfully!');
            })
            .catch(err => alert('Sync Issue: ' + err.message));
        });
      }
    });

    // Real-time Database Stream
    function initDatabaseListeners() {
      const slipsRef = ref(database, 'slips');
      const sortedQuery = query(slipsRef, orderByChild('timestamp'));

      onValue(sortedQuery, (snapshot) => {
        const records = [];
        snapshot.forEach((childSnapshot) => {
          records.push({ id: childSnapshot.key, ...childSnapshot.val() });
        });
        
        cachedSlipsArray = [...records].reverse();
        
        renderRecentFeed(cachedSlipsArray.slice(0, 5));
        renderViewTabFeed(cachedSlipsArray);
      });
    }

    function renderRecentFeed(items) {
      const target = document.getElementById('recentSlipsContainer');
      if (!target) return;
      if (items.length === 0) { 
        target.innerHTML = "<p style='color:var(--text-muted); font-size:14px; text-align:center;'>No slips generated yet.</p>"; 
        return; 
      }
      target.innerHTML = items.map(x => generateSlipMarkupRow(x)).join('');
    }

    function renderViewTabFeed(items) {
      const target = document.getElementById('allSlipsContainer');
      if (!target) return;
      if (items.length === 0) { 
        target.innerHTML = "<p style='color:var(--text-muted); font-size:14px; text-align:center;'>No records found.</p>"; 
        return; 
      }
      target.innerHTML = items.map(x => generateSlipMarkupRow(x)).join('');
    }

    function generateSlipMarkupRow(item) {
      const safeDataJson = JSON.stringify(item).replace(/"/g, '&quot;');
      return `
        <div class="slip-item">
          <div class="slip-info">
            <div class="slip-title-line">${item.name} <span class="slip-item-name">— ${item.item}</span></div>
            <div class="slip-meta-line">Logged: ${item.date} | Total Net: <strong class="glow-text">$${parseFloat(item.amount).toFixed(2)}</strong></div>
          </div>
          <button class="btn-print-small" onclick="openPrintModal('${safeDataJson}')">Preview & Print</button>
        </div>
      `;
    }

    // Attach search and modal helpers globally
    window.filterAllSlips = function() {
      const term = document.getElementById('searchBar').value.toLowerCase().trim();
      if(!term) {
        renderViewTabFeed(cachedSlipsArray);
        return;
      }
      const filtered = cachedSlipsArray.filter(x => 
        x.name.toLowerCase().includes(term) || 
        x.item.toLowerCase().includes(term)
      );
      renderViewTabFeed(filtered);
    }

    window.openPrintModal = function(serializedItemStr) {
      const slipObj = JSON.parse(serializedItemStr.replace(/&quot;/g, '"'));
      selectedActiveSlipForPrint = slipObj;

      const previewCard = document.getElementById('mini-preview-card');
      previewCard.innerHTML = `
        <div style="text-align:center; font-weight:700; font-size: 14px; color: var(--accent-bloom); border-bottom:1px solid rgba(0, 242, 254, 0.2); padding-bottom:10px; margin-bottom:15px; letter-spacing:1px;">SLIP PREVIEW</div>
        <div class="modal-preview-row"><strong>Date:</strong> <span>${slipObj.date}</span></div>
        <div class="modal-preview-row"><strong>Name:</strong> <span>${slipObj.name}</span></div>
        <div class="modal-preview-row"><strong>Item:</strong> <span>${slipObj.item}</span></div>
        <div class="modal-preview-row"><strong>Desc:</strong> <span>${slipObj.description || 'N/A'}</span></div>
        <div style="margin-top:15px; padding-top:10px; border-top:1px dashed rgba(0, 242, 254, 0.2); font-weight:700; font-size: 16px; color: var(--accent-bloom); display: flex; justify-content: space-between;">
          <span>Total Amount:</span>
          <span class="glow-text">$${parseFloat(slipObj.amount).toFixed(2)}</span>
        </div>
      `;

      document.getElementById('modalCopies').value = 1;
      document.getElementById('preview-modal').style.display = 'flex';
    }

    window.closePrintModal = function() {
      document.getElementById('preview-modal').style.display = 'none';
      selectedActiveSlipForPrint = null;
    }

    window.executeSystemPrint = function() {
      if(!selectedActiveSlipForPrint) return;

      const copiesCount = parseInt(document.getElementById('modalCopies').value) || 1;
      const printArea = document.getElementById('print-area');
      printArea.innerHTML = ''; 

      for (let i = 0; i < copiesCount; i++) {
        printArea.innerHTML += `
          <div class="print-slip">
            <div>
              <div class="slip-header">RECEIPT SLIP</div>
              <div class="slip-row"><span class="slip-label">Date:</span>${selectedActiveSlipForPrint.date}</div>
              <div class="slip-row"><span class="slip-label">Name:</span>${selectedActiveSlipForPrint.name}</div>
              <div class="slip-row"><span class="slip-label">Item:</span>${selectedActiveSlipForPrint.item}</div>
              <div class="slip-row"><span class="slip-label">Description:</span>${selectedActiveSlipForPrint.description || 'N/A'}</div>
            </div>
            <div class="slip-row" style="border-top: 2px solid #000; padding-top: 8px; font-size: 16px; font-weight: bold;">
              <span class="slip-label">Total Amount:</span>$${parseFloat(selectedActiveSlipForPrint.amount).toFixed(2)}
            </div>
          </div>
        `;
      }

      window.print();
      closePrintModal();
    }

    document.addEventListener("DOMContentLoaded", () => {
      const modal = document.getElementById('preview-modal');
      if (modal) {
        modal.addEventListener('click', function(e) {
          if(e.target === this) closePrintModal();
        });
      }
    });
  </script>

  <style>
    /* Premium Futuristic Dark Theme Variable Set */
    :root {
      --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
      --panel-bg: rgba(17, 24, 39, 0.75);
      --primary-cyan: #00f2fe;
      --accent-bloom: #00c6ff;
      --accent-glow: rgba(0, 242, 254, 0.15);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --shadow-md: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      padding: 20px 15px; /* Reduced to avoid cutoffs on tiny screens */
      color: var(--text-main);
      min-height: 100vh;
      box-sizing: border-box;
      /* REMOVED flexbox centering here to allow natural device scrolling! */
    }

    .main-container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      padding-bottom: 50px; /* Safe space at the bottom */
    }

    /* --- LANDING MENU OPTIONS --- */
    .menu-selection {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 5vh;
      animation: fadeIn 0.4s ease;
    }

    @media (max-width: 600px) {
      .menu-selection {
        grid-template-columns: 1fr; /* Stack menu options on mobile */
      }
    }
    
    .option-card {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      padding: 40px 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      text-align: center;
      cursor: pointer;
      border: 1px solid var(--border-color);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .option-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--primary-cyan), var(--accent-bloom));
      opacity: 0;
      transition: var(--transition);
    }

    .option-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 242, 254, 0.3);
      box-shadow: 0 12px 40px rgba(0, 242, 254, 0.15);
    }

    .option-card:hover::before {
      opacity: 1;
    }

    .option-card h2 {
      color: #ffffff;
      font-size: 22px;
      margin-top: 0;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .option-card p {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0;
      line-height: 1.5;
    }

    /* --- WORKSPACES --- */
    .workspace-panel {
      display: none;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
      animation: fadeIn 0.4s ease;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .panel-header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: var(--transition);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary-cyan);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Input Controls & Forms */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr; /* Single column on mobile to save vertical space and allow perfect fitting */
      }
      .full-width {
        grid-column: span 1;
      }
    }

    .form-group { margin-bottom: 15px; }
    .full-width { grid-column: span 2; }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.03);
      color: #ffffff;
      transition: var(--transition);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-cyan);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    textarea { height: 90px; resize: none; }
    
    button.btn-action {
      background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--accent-bloom) 100%);
      color: #0b0f19;
      padding: 14px 24px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(0, 242, 254, 0.25);
      transition: var(--transition);
      margin-top: 15px;
    }

    button.btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 242, 254, 0.4);
    }

    /* Lists & Result Items */
    .section-title {
      margin-top: 35px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--primary-cyan);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }

    .slip-list {
      margin-top: 15px;
      display: grid;
      gap: 12px;
    }

    .slip-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 16px 20px;
      border-radius: var(--radius);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }

    @media (max-width: 500px) {
      .slip-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .slip-item button {
        width: 100%;
      }
    }

    .slip-item:hover {
      border-color: rgba(0, 242, 254, 0.2);
      background: rgba(255, 255, 255, 0.04);
    }

    .slip-title-line { 
      font-weight: 700; 
      font-size: 15px; 
      color: #ffffff;
    }

    .slip-item-name {
      color: var(--text-muted); 
      font-weight: normal; 
      font-size: 13px;
    }

    .slip-meta-line { 
      color: var(--text-muted); 
      font-size: 12px; 
      margin-top: 4px; 
    }

    .glow-text {
      color: var(--primary-cyan);
      text-shadow: 0 0 8px var(--accent-glow);
    }
    
    .btn-print-small {
      background: rgba(0, 242, 254, 0.06);
      color: var(--primary-cyan);
      border: 1px solid rgba(0, 242, 254, 0.2);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: var(--transition);
    }

    .btn-print-small:hover {
      background: var(--primary-cyan);
      color: #0b0f19;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
    }

    /* Print Preview Modal - Glass Design */
    #preview-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 15, 25, 0.8);
      backdrop-filter: blur(12px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .modal-body {
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: var(--radius);
      max-width: 100%;
      width: 440px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
    }

    .modal-preview-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .modal-preview-row strong {
      color: var(--text-muted);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: var(--transition);
    }

    .btn-confirm { 
      background: var(--primary-cyan); 
      color: #0b0f19; 
    }

    .btn-confirm:hover {
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
    }

    .btn-cancel { 
      background: rgba(255, 255, 255, 0.05); 
      color: var(--text-main); 
      border: 1px solid var(--border-color);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Print styling rules */
    #print-area { display: none; }

    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 15px;
        position: absolute;
        left: 0; top: 0;
        width: 100%; height: 100%;
        box-sizing: border-box;
        padding: 15px;
      }
      .print-slip {
        border: 2px dashed #444;
        padding: 25px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: #fff;
        height: 100%;
        color: #000;
      }
      .slip-header {
        text-align: center;
        border-bottom: 2px solid #000;
        padding-bottom: 8px;
        margin-bottom: 15px;
        font-weight: bold;
        font-size: 20px;
      }
      .slip-row { margin-bottom: 10px; font-size: 14px; }
      .slip-label { font-weight: bold; display: inline-block; width: 95px; }
    }
  </style>
</head>
<body>

  <div class="main-container">
    
    <div id="landingMenu" class="menu-selection">
      <div class="option-card" onclick="openWorkspace('createWorkspace')">
        <h2>Create Slip</h2>
        <p>Log a new receipt record seamlessly to the cloud database</p>
      </div>
      <div class="option-card" onclick="openWorkspace('viewWorkspace')">
        <h2>View Slips</h2>
        <p>Dynamic keyword search, real-time sync, and multi-copy printing layouts</p>
      </div>
    </div>

    <div id="createWorkspace" class="workspace-panel">
      <div class="panel-header">
        <h1>Create New Slip</h1>
        <button
