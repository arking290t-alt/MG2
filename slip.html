<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip Management Hub</title>
  
  <!-- Modern Firebase v10 Modular SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Your exact Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
      authDomain: "mg-manager-3ab66.firebaseapp.com",
      projectId: "mg-manager-3ab66",
      storageBucket: "mg-manager-3ab66.firebasestorage.app",
      messagingSenderId: "330667005987",
      appId: "1:330667005987:web:95de27b6259ace9fc6b996",
      measurementId: "G-05HW0KSN38"
    };

    // Initialize Firebase Services
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let cachedSlipsArray = [];
    let selectedActiveSlipForPrint = null;

    // Load initial listeners and set input default date
    document.addEventListener("DOMContentLoaded", () => {
      const dateEl = document.getElementById('date');
      if (dateEl) {
        dateEl.value = new Date().toISOString().split('T')[0];
      }
      initDatabaseListeners();
    });

    // Make navigation functions globally accessible from modular script
    window.openWorkspace = function(workspaceId) {
      document.getElementById('landingMenu').style.display = 'none';
      document.querySelectorAll('.workspace-panel').forEach(el => el.style.display = 'none');
      document.getElementById(workspaceId).style.display = 'block';
      window.scrollTo(0, 0); // Reset scroll to top
    }

    window.showLandingMenu = function() {
      document.querySelectorAll('.workspace-panel').forEach(el => el.style.display = 'none');
      document.getElementById('landingMenu').style.display = 'block';
      window.scrollTo(0, 0);
    }

    // Capture Submit Action
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById('slipForm');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          
          const targetSlip = {
            name: document.getElementById('name').value,
            item: document.getElementById('item').value,
            description: document.getElementById('description').value,
            amount: document.getElementById('amount').value,
            date: document.getElementById('date').value,
            timestamp: Date.now()
          };

          const slipsRef = ref(database, 'slips');
          const newSlipRef = push(slipsRef);
          
          set(newSlipRef, targetSlip)
            .then(() => {
              // Reset values instead of hard form structural reload
              document.getElementById('name').value = '';
              document.getElementById('item').value = '';
              document.getElementById('description').value = '';
              document.getElementById('amount').value = '';
              document.getElementById('date').value = new Date().toISOString().split('T')[0];
              
              alert('Saved successfully!');
            })
            .catch(err => alert('Sync Issue: ' + err.message));
        });
      }
    });

    // Real-time Database Stream
    function initDatabaseListeners() {
      const slipsRef = ref(database, 'slips');
      const sortedQuery = query(slipsRef, orderByChild('timestamp'));

      onValue(sortedQuery, (snapshot) => {
        const records = [];
        snapshot.forEach((childSnapshot) => {
          records.push({ id: childSnapshot.key, ...childSnapshot.val() });
        });
        
        cachedSlipsArray = [...records].reverse();
        
        renderRecentFeed(cachedSlipsArray.slice(0, 5));
        renderViewTabFeed(cachedSlipsArray);
      });
    }

    function renderRecentFeed(items) {
      const target = document.getElementById('recentSlipsContainer');
      if (!target) return;
      if (items.length === 0) { 
        target.innerHTML = "<p style='color:var(--text-muted); font-size:14px; text-align:center;'>No slips generated yet.</p>"; 
        return; 
      }
      target.innerHTML = items.map(x => generateSlipMarkupRow(x)).join('');
    }

    function renderViewTabFeed(items) {
      const target = document.getElementById('allSlipsContainer');
      if (!target) return;
      if (items.length === 0) { 
        target.innerHTML = "<p style='color:var(--text-muted); font-size:14px; text-align:center;'>No records found.</p>"; 
        return; 
      }
      target.innerHTML = items.map(x => generateSlipMarkupRow(x)).join('');
    }

    function generateSlipMarkupRow(item) {
      const safeDataJson = JSON.stringify(item).replace(/"/g, '&quot;');
      return `
        <div class="slip-item">
          <div class="slip-info">
            <div class="slip-title-line">${item.name} <span class="slip-item-name">— ${item.item}</span></div>
            <div class="slip-meta-line">Logged: ${item.date} | Total Net: <strong class="glow-text">$${parseFloat(item.amount).toFixed(2)}</strong></div>
          </div>
          <button class="btn-print-small" onclick="openPrintModal('${safeDataJson}')">Preview & Print</button>
        </div>
      `;
    }

    // Attach search and modal helpers globally
    window.filterAllSlips = function() {
      const term = document.getElementById('searchBar').value.toLowerCase().trim();
      if(!term) {
        renderViewTabFeed(cachedSlipsArray);
        return;
      }
      const filtered = cachedSlipsArray.filter(x => 
        x.name.toLowerCase().includes(term) || 
        x.item.toLowerCase().includes(term)
      );
      renderViewTabFeed(filtered);
    }

    window.openPrintModal = function(serializedItemStr) {
      const slipObj = JSON.parse(serializedItemStr.replace(/&quot;/g, '"'));
      selectedActiveSlipForPrint = slipObj;

      const previewCard = document.getElementById('mini-preview-card');
      previewCard.innerHTML = `
        <div style="text-align:center; font-weight:700; font-size: 14px; color: var(--accent-bloom); border-bottom:1px solid rgba(0, 242, 254, 0.2); padding-bottom:10px; margin-bottom:15px; letter-spacing:1px;">SLIP PREVIEW</div>
        <div class="modal-preview-row"><strong>Date:</strong> <span>${slipObj.date}</span></div>
        <div class="modal-preview-row"><strong>Name:</strong> <span>${slipObj.name}</span></div>
        <div class="modal-preview-row"><strong>Item:</strong> <span>${slipObj.item}</span></div>
        <div class="modal-preview-row"><strong>Desc:</strong> <span>${slipObj.description || 'N/A'}</span></div>
        <div style="margin-top:15px; padding-top:10px; border-top:1px dashed rgba(0, 242, 254, 0.2); font-weight:700; font-size: 16px; color: var(--accent-bloom); display: flex; justify-content: space-between;">
          <span>Total Amount:</span>
          <span class="glow-text">$${parseFloat(slipObj.amount).toFixed(2)}</span>
        </div>
      `;

      document.getElementById('modalCopies').value = 1;
      document.getElementById('preview-modal').style.display = 'flex';
    }

    window.closePrintModal = function() {
      document.getElementById('preview-modal').style.display = 'none';
      selectedActiveSlipForPrint = null;
    }

    window.executeSystemPrint = function() {
      if(!selectedActiveSlipForPrint) return;

      const copiesCount = parseInt(document.getElementById('modalCopies').value) || 1;
      const printArea = document.getElementById('print-area');
      printArea.innerHTML = ''; 

      for (let i = 0; i < copiesCount; i++) {
        printArea.innerHTML += `
          <div class="print-slip">
            <div>
              <div class="slip-header">RECEIPT SLIP</div>
              <div class="slip-row"><span class="slip-label">Date:</span>${selectedActiveSlipForPrint.date}</div>
              <div class="slip-row"><span class="slip-label">Name:</span>${selectedActiveSlipForPrint.name}</div>
              <div class="slip-row"><span class="slip-label">Item:</span>${selectedActiveSlipForPrint.item}</div>
              <div class="slip-row"><span class="slip-label">Description:</span>${selectedActiveSlipForPrint.description || 'N/A'}</div>
            </div>
            <div class="slip-row" style="border-top: 2px solid #000; padding-top: 8px; font-size: 16px; font-weight: bold;">
              <span class="slip-label">Total Amount:</span>$${parseFloat(selectedActiveSlipForPrint.amount).toFixed(2)}
            </div>
          </div>
        `;
      }

      window.print();
      closePrintModal();
    }

    document.addEventListener("DOMContentLoaded", () => {
      const modal = document.getElementById('preview-modal');
      if (modal) {
        modal.addEventListener('click', function(e) {
          if(e.target === this) closePrintModal();
        });
      }
    });
  </script>

  <style>
    /* Premium Futuristic Dark Theme Variable Set */
    :root {
      --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
      --panel-bg: rgba(17, 24, 39, 0.95);
      --primary-cyan: #00f2fe;
      --accent-bloom: #00c6ff;
      --accent-glow: rgba(0, 242, 254, 0.15);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.12);
      --radius: 16px;
      --shadow-md: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      --transition: all 0.2s ease-in-out;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      padding: 15px;
      color: var(--text-main);
      min-height: 100vh;
      box-sizing: border-box;
    }

    .main-container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* --- LANDING MENU --- */
    .menu-selection {
      display: block; /* Removed CSS Grid */
      margin-top: 20px;
    }
    
    .option-card {
      background: var(--panel-bg);
      padding: 30px 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      text-align: center;
      cursor: pointer;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
      transition: var(--transition);
    }

    .option-card:hover {
      border-color: var(--primary-cyan);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }

    .option-card h2 {
      color: #ffffff;
      font-size: 22px;
      margin: 0 0 10px 0;
      font-weight: 700;
    }

    .option-card p {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0;
      line-height: 1.5;
    }

    /* --- WORKSPACES --- */
    .workspace-panel {
      display: none;
      background: var(--panel-bg);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .panel-header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    /* --- FORM LAYOUT: SOLID VERTICAL STACK --- */
    .form-group {
      display: block;
      margin-bottom: 20px;
      width: 100%;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }
    
    input, textarea {
      display: block;
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.03);
      color: #ffffff;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-cyan);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    textarea { 
      height: 90px; 
      resize: none; 
    }
    
    button.btn-action {
      display: block;
      background: linear-gradient(135deg, var(--primary-cyan) 0%, var(--accent-bloom) 100%);
      color: #0b0f19;
      padding: 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
      margin-top: 25px;
    }

    /* --- SLIPS LIST --- */
    .section-title {
      margin-top: 35px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--primary-cyan);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }

    .slip-list {
      margin-top: 15px;
    }

    .slip-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 15px;
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    .slip-title-line { 
      font-weight: 700; 
      font-size: 15px; 
      color: #ffffff;
    }

    .slip-item-name {
      color: var(--text-muted); 
      font-size: 13px;
    }

    .slip-meta-line { 
      color: var(--text-muted); 
      font-size: 12px; 
      margin-top: 5px; 
    }

    .glow-text {
      color: var(--primary-cyan);
    }
    
    .btn-print-small {
      display: block;
      width: 100%;
      background: rgba(0, 242, 254, 0.06);
      color: var(--primary-cyan);
      border: 1px solid rgba(0, 242, 254, 0.2);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    /* --- MODAL --- */
    #preview-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 15, 25, 0.9);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 15px;
      box-sizing: border-box;
    }

    .modal-body {
      background: #111827;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 20px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .btn-confirm { background: var(--primary-cyan); color: #0b0f19; }
    .btn-cancel { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--border-color); }

    /* Print styling rules */
    #print-area { display: none; }

    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 15px;
        position: absolute;
        left: 0; top: 0;
        width: 100%; height: 100%;
        box-sizing: border-box;
        padding: 15px;
      }
      .print-slip {
        border: 2px dashed #444;
        padding: 25px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: #fff;
        height: 100%;
        color: #000;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">
    
    <!-- FIRST SCREEN: MAIN MENU OPTIONS -->
    <div id="landingMenu" class="menu-selection">
      <div class="option-card" onclick="openWorkspace('createWorkspace')">
        <h2>Create Slip</h2>
        <p>Log a new receipt record seamlessly to the cloud database</p>
      </div>
      <div class="option-card" onclick="openWorkspace('viewWorkspace')">
        <h2>View Slips</h2>
        <p>Dynamic keyword search, real-time sync, and multi-copy printing layouts</p>
      </div>
    </div>

    <!-- WORKSPACE PANEL: CREATE SLIP -->
    <div id="createWorkspace" class="workspace-panel">
      <div class="panel-header">
        <h1>Create New Slip</h1>
        <button class="btn-back" onclick="showLandingMenu()">← Back</button>
      </div>
      
      <form id="slipForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" required placeholder="Customer or company name">
        </div>

        <div class="form-group">
          <label for="item">Item</label>
          <input type="text" id="item" required placeholder="Product or item title">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Provide extra details..."></textarea>
        </div>

        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" step="0.01" required placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>

        <button type="submit" class="btn-action">Save to Database</button>
      </form>

      <div class="section-title">Recent 5 Slips</div>
      <div id="recentSlipsContainer" class="slip-list">Loading real-time records...</div>
    </div>

    <!-- WORKSPACE PANEL: VIEW SLIPS -->
    <div id="viewWorkspace" class="workspace-panel">
      <div class="panel-header">
        <h1>Search & View Logs</h1>
        <button class="btn-back" onclick="showLandingMenu()">← Back</button>
      </div>

      <div class="form-group">
        <label for="searchBar">Dynamic Search Filter</label>
        <input type="text" id="searchBar" placeholder="Type keyword to filter..." oninput="filterAllSlips()">
      </div>
      
      <div class="section-title">All Registered Logs</div>
      <div id="allSlipsContainer" class="slip-list">Awaiting connection sync...</div>
    </div>

  </div>

  <!-- GLASS-PREVIEW OVERLAY MODAL -->
  <div id="preview-modal">
    <div class="modal-body">
      <h3 style="margin-top:0; color: #ffffff; font-size: 18px; font-weight: 700;">Print Setup</h3>
      <div id="mini-preview-card"></div>
      <div class="form-group">
        <label for="modalCopies">Number of Copies:</label>
        <input type="number" id="modalCopies" min="1" max="4" value="1">
      </div>
      <div class="modal-buttons">
        <button class="modal-btn btn-confirm" onclick="executeSystemPrint()">Confirm & Print</button>
        <button class="modal-btn btn-cancel" onclick="closePrintModal()">Close</button>
      </div>
    </div>
  </div>

  <div id="print-area"></div>

</body>
</html>
