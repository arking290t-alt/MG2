<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daybook</title>

<style>
body{
    font-family:Segoe UI, sans-serif;
    background:#f1f3f6;
    margin:0;
    padding:15px;
}
.container{max-width:1600px;margin:auto;}
h2{margin:5px 0 15px 0;}

.card{
    background:#fff;
    padding:12px 15px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    margin-bottom:12px;
}

.row{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

input,select{
    padding:6px 8px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:13px;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:#fff;
    cursor:pointer;
    font-size:13px;
}
button:hover{background:#084298;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}
th,td{
    padding:8px;
    border-bottom:1px solid #e5e5e5;
    text-align:center;
}
th{background:#f7f9fb;}

.badge-dr{color:red;font-weight:600;}
.badge-cr{color:green;font-weight:600;}

.summary{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
.summary-box{
    background:#eef2ff;
    padding:8px 12px;
    border-radius:6px;
    font-size:13px;
}
.deleted{
    background:#fff4f4;
    padding:10px;
    border-radius:6px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h2>DAYBOOK</h2>

<!-- SUMMARY -->
<div class="card summary" id="summary"></div>

<!-- ACCOUNT + ENTRY IN SAME ROW -->
<div class="card row">

<input type="text" id="accountName" placeholder="Account Name">
<input type="number" id="accountAmount" placeholder="Opening Amount">
<button id="addAccount">Add Account</button>

<div style="flex:1"></div>

<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Dr</option>
<option value="Cr">Cr</option>
</select>
<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add</button>

</div>

<!-- FILTER -->
<div class="card row">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
<button id="showDeleted">Deleted Entries</button>
</div>

<!-- ACCOUNTS -->
<div class="card">
<table>
<thead>
<tr>
<th>Account</th>
<th>Opening</th>
<th>Closing</th>
<th>Action</th>
</tr>
</thead>
<tbody id="accountTable"></tbody>
</table>
</div>

<!-- ENTRIES -->
<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Amount</th>
<th>Type</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>
<tbody id="entryTable"></tbody>
</table>
</div>

<div class="deleted" id="deletedSection" style="display:none;">
<h4>Deleted Entries</h4>
<table>
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>
<tbody id="deletedTable"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66",
  storageBucket: "mg-manager-3ab66.firebasestorage.app",
  messagingSenderId: "330667005987",
  appId: "1:330667005987:web:95de27b6259ace9fc6b996",
  measurementId: "G-05HW0KSN38"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const accountsCol = collection(db,"accounts");
const entriesCol = collection(db,"entries");
const deletedCol = collection(db,"deleted");

let accounts=[];

function todayDate(){
    return new Date().toISOString().split("T")[0];
}

date.value=todayDate();
filterDate.value=todayDate();

todayBtn.onclick=()=>{filterDate.value=todayDate();renderEntries();};

addAccount.onclick=async()=>{
    if(!accountName.value||!accountAmount.value) return;
    await addDoc(accountsCol,{
        name:accountName.value,
        opening:parseFloat(accountAmount.value),
        balance:parseFloat(accountAmount.value)
    });
    accountName.value="";
    accountAmount.value="";
};

addEntry.onclick=async()=>{
    if(!entryName.value||!amount.value||!date.value) return;

    const acc=accounts[accountSelect.value];

    let newBalance = acc.balance;
    if(type.value==="Dr") newBalance-=parseFloat(amount.value);
    else newBalance+=parseFloat(amount.value);

    await updateDoc(doc(db,"accounts",acc.id),{balance:newBalance});

    await addDoc(entriesCol,{
        name:entryName.value,
        purpose:purpose.value,
        amount:parseFloat(amount.value),
        accountId:acc.id,
        accountName:acc.name,
        type:type.value,
        date:date.value,
        note:note.value
    });

    entryName.value="";
    purpose.value="";
    amount.value="";
    note.value="";
};

onSnapshot(accountsCol,(snap)=>{
    accounts=[];
    accountTable.innerHTML="";
    accountSelect.innerHTML="";
    summary.innerHTML="";
    snap.forEach(docu=>{
        const d=docu.data();
        accounts.push({...d,id:docu.id});
    });

    accounts.forEach((acc,i)=>{
        accountTable.innerHTML+=`
        <tr>
        <td>${acc.name}</td>
        <td>${acc.opening}</td>
        <td>${acc.balance}</td>
        <td>
        <button onclick="editAcc('${acc.id}')">Edit</button>
        <button onclick="delAcc('${acc.id}')">Delete</button>
        </td>
        </tr>`;

        accountSelect.innerHTML+=`<option value="${i}">${acc.name}</option>`;

        summary.innerHTML+=`
        <div class="summary-box">
        <strong>${acc.name}</strong><br>
        Opening: ${acc.opening}<br>
        Closing: ${acc.balance}
        </div>`;
    });
});

onSnapshot(entriesCol,(snap)=>{
    renderEntries(snap);
});

function renderEntries(snapshot){
    entryTable.innerHTML="";
    const filter=filterDate.value;
    snapshot.forEach(docu=>{
        const e=docu.data();
        if(filter && e.date!==filter) return;
        entryTable.innerHTML+=`
        <tr>
        <td>${e.name}</td>
        <td>${e.purpose}</td>
        <td>${e.accountName}</td>
        <td>${e.amount}</td>
        <td class="${e.type==="Dr"?"badge-dr":"badge-cr"}">${e.type}</td>
        <td>${e.date}</td>
        <td>${e.note}</td>
        <td><button onclick="deleteEntry('${docu.id}')">Delete</button></td>
        </tr>`;
    });
}

window.deleteEntry=async(id)=>{
    const snap=await getDocs(entriesCol);
    snap.forEach(async d=>{
        if(d.id===id){
            await addDoc(deletedCol,d.data());
            await deleteDoc(doc(db,"entries",id));
        }
    });
};

window.editAcc=async(id)=>{
    const pass=prompt("Password");
    if(pass!=="BNPRATHAM@8056079200") return alert("Wrong Password");
    const newBal=prompt("Enter new balance");
    await updateDoc(doc(db,"accounts",id),{balance:parseFloat(newBal)});
};

window.delAcc=async(id)=>{
    const pass=prompt("Password");
    if(pass!=="BNPRATHAM@8056079200") return alert("Wrong Password");
    await deleteDoc(doc(db,"accounts",id));
};

showDeleted.onclick=()=>{
    deletedSection.style.display="block";
    onSnapshot(deletedCol,(snap)=>{
        deletedTable.innerHTML="";
        snap.forEach(d=>{
            const e=d.data();
            deletedTable.innerHTML+=`
            <tr>
            <td>${e.name}</td>
            <td>${e.purpose}</td>
            <td>${e.amount}</td>
            <td>${e.date}</td>
            </tr>`;
        });
    });
};

</script>
</body>
</html>
