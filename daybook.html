<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{margin:0;font-family:Segoe UI;background:#eef2f7;}

.container{width:95%;margin:auto;margin-top:20px;}

.top-grid{display:grid;grid-template-columns:1fr 2fr;gap:20px;}

.card{
background:#fff;
padding:18px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
margin-bottom:20px;
}

input,select{
padding:8px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#0d6efd;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

.balance-row{
margin-top:10px;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">

<h3>Add Account</h3>

<input id="accountName" placeholder="Account Name">
<input id="accountAmount" type="number" placeholder="Opening Amount">

<button id="addAccount">Add Account</button>

<hr>

<h4>Accounts</h4>

<table>
<thead>
<tr>
<th>Account</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>

<tbody id="accountTable"></tbody>

</table>

</div>

<div class="card">

<h3>Add Entry</h3>

<select id="entryMode">
<option value="normal">Normal Entry</option>
<option value="transfer">Inter Account Transfer</option>
</select>

<br>

<input id="entryName" placeholder="Name">
<input id="purpose" placeholder="Purpose">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<br>

<div id="normalFields">

<select id="accountSelect"></select>

<select id="type">
<option value="Dr">Debit</option>
<option value="Cr">Credit</option>
</select>

</div>

<div id="transferFields" style="display:none">

From
<select id="fromAccount"></select>

To
<select id="toAccount"></select>

</div>

<br>

<input id="note" placeholder="Note">

<button id="addEntry">Add Entry</button>

</div>

</div>

<div class="card">

<input type="date" id="filterDate">

<button id="todayBtn">Today</button>
<button id="showDeletedBtn">Deleted</button>
<button id="showEditedBtn">Edited</button>
<button id="ssBtn">SS</button>

<div class="balance-row">
Opening Balance: <span id="openingBalance">0.00</span>
</div>

</div>

<div class="card">

<h3 id="viewTitle">Entries</h3>

<table>

<thead>

<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="balance-row">
Closing Balance: <span id="closingBalance">0.00</span>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
updateDoc,
deleteDoc,
doc,
onSnapshot,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
authDomain:"mg-manager-3ab66.firebaseapp.com",
projectId:"mg-manager-3ab66"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const PASSWORD="BNPRATHAM@8056079200";

const accountsCol=collection(db,"accounts");
const entriesCol=collection(db,"entries");

let accounts=[];
let entries=[];
let viewMode="entries";

const accountSelect=document.getElementById("accountSelect");
const fromAccount=document.getElementById("fromAccount");
const toAccount=document.getElementById("toAccount");

const accountTable=document.getElementById("accountTable");

const tableBody=document.getElementById("tableBody");

const openingBalanceEl=document.getElementById("openingBalance");
const closingBalanceEl=document.getElementById("closingBalance");

const filterDate=document.getElementById("filterDate");
const date=document.getElementById("date");

function today(){
return new Date().toISOString().split("T")[0];
}

date.value=today();
filterDate.value=today();

function calculateBalances(){

let opening=0;

accounts.forEach(a=>{
opening+=Number(a.balance)||0;
});

let dr=0;
let cr=0;

entries.forEach(e=>{

if(e.date===filterDate.value){

if(e.type==="Dr") dr+=Number(e.amount);
if(e.type==="Cr") cr+=Number(e.amount);

}

});

openingBalanceEl.innerText=opening.toFixed(2);
closingBalanceEl.innerText=(opening+cr-dr).toFixed(2);

}

async function updateAccountBalance(accountId,type,amount){

const acc=accounts.find(a=>a.id===accountId);

if(!acc)return;

let newBalance=acc.balance;

if(type==="Dr") newBalance-=Number(amount);
if(type==="Cr") newBalance+=Number(amount);

await updateDoc(doc(db,"accounts",accountId),{
balance:newBalance
});

}

document.getElementById("addAccount").onclick=async()=>{

const name=document.getElementById("accountName").value;
const amount=document.getElementById("accountAmount").value;

await addDoc(accountsCol,{
name:name,
balance:Number(amount)
});

};

document.getElementById("addEntry").onclick=async()=>{

const mode=document.getElementById("entryMode").value;
const amt=Number(document.getElementById("amount").value);

if(mode==="normal"){

const accountId=accountSelect.value;
const type=document.getElementById("type").value;

await addDoc(entriesCol,{
name:document.getElementById("entryName").value,
purpose:document.getElementById("purpose").value,
amount:amt,
accountId:accountId,
type:type,
date:date.value,
note:document.getElementById("note").value
});

await updateAccountBalance(accountId,type,amt);

}

else{

const from=fromAccount.value;
const to=toAccount.value;

await addDoc(entriesCol,{
amount:amt,
accountId:from,
type:"Dr",
date:date.value
});

await addDoc(entriesCol,{
amount:amt,
accountId:to,
type:"Cr",
date:date.value
});

await updateAccountBalance(from,"Dr",amt);
await updateAccountBalance(to,"Cr",amt);

}

};

onSnapshot(accountsCol,snap=>{

accounts=[];

accountSelect.innerHTML="";
fromAccount.innerHTML="";
toAccount.innerHTML="";
accountTable.innerHTML="";

snap.forEach(d=>{

let a={...d.data(),id:d.id};

accounts.push(a);

accountSelect.innerHTML+=`<option value="${a.id}">${a.name}</option>`;

fromAccount.innerHTML+=`<option value="${a.id}">${a.name}</option>`;
toAccount.innerHTML+=`<option value="${a.id}">${a.name}</option>`;

accountTable.innerHTML+=`
<tr>
<td>${a.name}</td>
<td>${a.balance.toFixed(2)}</td>
<td>
<button onclick="deleteAccount('${a.id}')">Delete</button>
</td>
</tr>
`;

});

calculateBalances();

});

onSnapshot(entriesCol,snap=>{

entries=[];

snap.forEach(d=>entries.push({...d.data(),id:d.id}));

render();

});

function render(){

tableBody.innerHTML="";

entries.forEach(e=>{

if(e.date===filterDate.value){

let acc=accounts.find(a=>a.id===e.accountId);

tableBody.innerHTML+=`

<tr>

<td>${e.name||""}</td>
<td>${e.purpose||""}</td>
<td>${acc?acc.name:""}</td>

<td>${e.type==="Dr"?e.amount:""}</td>
<td>${e.type==="Cr"?e.amount:""}</td>

<td>${e.date}</td>
<td>${e.note||""}</td>

<td>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>

</tr>

`;

}

});

calculateBalances();

}

window.deleteEntry=async(id)=>{

const ref=doc(db,"entries",id);
const snap=await getDoc(ref);

const data=snap.data();

await updateAccountBalance(
data.accountId,
data.type==="Dr"?"Cr":"Dr",
data.amount
);

await deleteDoc(ref);

};

</script>

</body>
</html>
