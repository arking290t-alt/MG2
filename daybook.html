<!DOCTYPE html>
<html>
<head>
  <title>Daybook | MG</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      color: #111;
    }

    .container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 20px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 30px;
    }

    .card {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      width: 100%;
      margin-bottom: 10px;
    }

    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      margin-right: 6px;
    }

    .blue { background:#1d72f3; color:#fff; }
    .green { background:#28a745; color:#fff; }
    .red { background:#dc3545; color:#fff; }
    .grey { background:#6c757d; color:#fff; }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:15px;
      background:#fff;
    }

    th {
      background:#1d72f3;
      color:#fff;
      padding:10px;
      font-size:14px;
    }

    td {
      padding:10px;
      border-bottom:1px solid #eee;
      text-align:center;
      font-size:14px;
    }

    .summary {
      background:#f4f6f9;
      padding:12px;
      border-radius:8px;
      margin:10px 0;
      font-weight:600;
    }

    @media(max-width:1000px){
      .top-grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

<div class="container">

<h2>Daybook</h2>

<div class="top-grid">

  <!-- ACCOUNTS -->
  <div class="card">
    <h3>Accounts</h3>

    <input type="text" id="accountName" placeholder="Account Name">
    <input type="number" id="openingBalance" placeholder="Opening Balance">
    <button class="btn blue" onclick="createAccount()">Add Account</button>

    <div id="accountsList"></div>
  </div>

  <!-- ADD ENTRY -->
  <div class="card">
    <h3>Add Entry</h3>

    <input type="text" id="entryName" placeholder="Name">
    <input type="text" id="purpose" placeholder="Purpose">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="date">

    <select id="accountSelect"></select>

    <select id="type">
      <option value="Dr">Debit (Dr)</option>
      <option value="Cr">Credit (Cr)</option>
    </select>

    <button class="btn green" onclick="addEntry()">Add Entry</button>
  </div>

</div>

<!-- VIEW -->
<div class="card">

  <h3>Daybook View</h3>

  <button class="btn grey" onclick="viewToday()">Today</button>
  <button class="btn grey" onclick="viewAll()">All Entries</button>
  <button class="btn red" onclick="viewDeleted()">Deleted</button>

  <input type="date" id="filterDate" style="max-width:200px; display:inline-block;">
  <button class="btn blue" onclick="filterByDate()">Filter Date</button>

  <div id="openingSummary" class="summary"></div>
  <div id="tableContainer"></div>
  <div id="closingSummary" class="summary"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66",
};

const PASSWORD = "BNPRATHAM@8056079200";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD ACCOUNTS */
async function loadAccounts(){
  const snapshot = await getDocs(collection(db,"accounts"));
  accountSelect.innerHTML="";
  accountsList.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();

    accountSelect.innerHTML+=`<option value="${docSnap.id}">${data.name}</option>`;

    accountsList.innerHTML+=`
      <div style="margin:8px 0;">
        ${data.name} - ₹${data.balance}
        <button class="btn grey" onclick="editBalance('${docSnap.id}',${data.balance})">Edit</button>
        <button class="btn red" onclick="deleteAccount('${docSnap.id}')">Delete</button>
      </div>
    `;
  });
}

/* CREATE ACCOUNT */
window.createAccount = async function(){
  const name=accountName.value.trim();
  const balance=Number(openingBalance.value)||0;
  if(!name) return alert("Enter account name");

  await addDoc(collection(db,"accounts"),{name,balance});
  accountName.value="";
  openingBalance.value="";
  loadAccounts();
};

/* EDIT BALANCE */
window.editBalance = async function(id,current){
  const pass=prompt("Enter Password");
  if(pass!==PASSWORD) return alert("Wrong Password");

  const newBalance=prompt("New Balance",current);
  await updateDoc(doc(db,"accounts",id),{balance:Number(newBalance)});
  loadAccounts();
};

/* DELETE ACCOUNT */
window.deleteAccount = async function(id){
  const pass=prompt("Enter Password to Delete Account");
  if(pass!==PASSWORD) return alert("Wrong Password");

  const confirmDelete=confirm("Are you sure you want to delete this account?");
  if(!confirmDelete) return;

  await deleteDoc(doc(db,"accounts",id));
  loadAccounts();
};

/* ADD ENTRY */
window.addEntry = async function(){
  const name=entryName.value;
  const purpose=purpose.value;
  const amount=Number(amount.value);
  const date=date.value;
  const accountId=accountSelect.value;
  const type=type.value;

  if(!name||!amount||!date) return alert("Fill fields");

  await addDoc(collection(db,"daybook"),{
    name,purpose,amount,date,accountId,type,deleted:false
  });

  viewToday();
};

/* DELETE ENTRY */
window.deleteEntry = async function(id){
  await updateDoc(doc(db,"daybook",id),{deleted:true});
  viewToday();
};

/* VIEW FUNCTIONS */

window.viewToday = async function(){
  const today=new Date().toISOString().split("T")[0];
  const q=query(collection(db,"daybook"),where("date","==",today),where("deleted","==",false));
  const snapshot=await getDocs(q);
  render(snapshot,false);
};

window.viewAll = async function(){
  const q=query(collection(db,"daybook"),where("deleted","==",false));
  const snapshot=await getDocs(q);
  render(snapshot,false);
};

window.viewDeleted = async function(){
  const q=query(collection(db,"daybook"),where("deleted","==",true));
  const snapshot=await getDocs(q);
  render(snapshot,true);
};

window.filterByDate = async function(){
  const d=filterDate.value;
  const q=query(collection(db,"daybook"),where("date","==",d));
  const snapshot=await getDocs(q);
  render(snapshot,false);
};

/* RENDER */
function render(snapshot,isDeleted){

  let html=`<table>
  <tr><th>Name</th><th>Purpose</th><th>Amount</th><th>Date</th><th>Type</th>${!isDeleted?"<th>Action</th>":""}</tr>`;

  snapshot.forEach(docSnap=>{
    const d=docSnap.data();

    html+=`
    <tr>
    <td>${d.name}</td>
    <td>${d.purpose}</td>
    <td>${d.amount}</td>
    <td>${d.date}</td>
    <td>${d.type}</td>
    ${!isDeleted?`<td><button class="btn red" onclick="deleteEntry('${docSnap.id}')">Delete</button></td>`:""}
    </tr>`;
  });

  html+="</table>";
  tableContainer.innerHTML=html;
}

loadAccounts();
viewToday();

</script>

</body>
</html>
