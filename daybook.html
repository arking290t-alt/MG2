<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
}

.container{
width:95%;
margin:auto;
margin-top:20px;
}

h2{
margin-bottom:20px;
}

.top-grid{
display:grid;
grid-template-columns:1fr 2fr;
gap:20px;
}

.card{
background:#fff;
padding:18px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
margin-bottom:20px;
}

input,select{
padding:8px;
margin:6px 6px 6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#0d6efd;
color:white;
cursor:pointer;
font-size:13px;
}

button:hover{
background:#0b5ed7;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#f8f9fa;
}

.balance-row{
margin-top:12px;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">

<h3>Add Account</h3>

<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>

<button id="addAccount">Add Account</button>

<hr>

<h4>Accounts</h4>

<table>

<thead>
<tr>
<th>Account</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>

<tbody id="accountTable"></tbody>

</table>

</div>

<div class="card">

<h3>Add Entry</h3>

<select id="entryMode">
<option value="normal">Normal Entry</option>
<option value="transfer">Inter Account Transfer</option>
</select><br>

<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date"><br>

<div id="normalFields">

<select id="accountSelect"></select>

<select id="type">
<option value="Dr">Debit (Dr)</option>
<option value="Cr">Credit (Cr)</option>
</select>

</div>

<div id="transferFields" style="display:none">

From
<select id="fromAccount"></select>

To
<select id="toAccount"></select>

</div><br>

<input type="text" id="note" placeholder="Note">

<button id="addEntry">Add Entry</button>

</div>

</div>

<div class="card">

<input type="date" id="filterDate">

<button id="todayBtn">Today</button>
<button id="showDeletedBtn">Deleted</button>
<button id="showEditedBtn">Edited</button>
<button id="ssBtn">SS</button>

<div class="balance-row">
Opening Balance:
<span id="openingBalance">0.00</span>
</div>

</div>

<div class="card">

<h3 id="viewTitle">Entries</h3>

<table>

<thead>

<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="balance-row">
Closing Balance:
<span id="closingBalance">0.00</span>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
updateDoc,
deleteDoc,
doc,
onSnapshot,
getDoc
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
authDomain:"mg-manager-3ab66.firebaseapp.com",
projectId:"mg-manager-3ab66"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const PASSWORD="BNPRATHAM@8056079200";

function today(){
return new Date().toISOString().split("T")[0];
}

const accountsCol=collection(db,"accounts");
const entriesCol=collection(db,"entries");
const deletedCol=collection(db,"deletedEntries");
const editedCol=collection(db,"editedEntries");

let accounts=[];
let entries=[];
let deletedEntries=[];
let editedEntries=[];
let viewMode="entries";

const accountName=document.getElementById("accountName");
const accountAmount=document.getElementById("accountAmount");
const addAccountBtn=document.getElementById("addAccount");
const accountTable=document.getElementById("accountTable");
const accountSelect=document.getElementById("accountSelect");
const fromAccount=document.getElementById("fromAccount");
const toAccount=document.getElementById("toAccount");

const entryName=document.getElementById("entryName");
const purpose=document.getElementById("purpose");
const amount=document.getElementById("amount");
const date=document.getElementById("date");
const type=document.getElementById("type");
const note=document.getElementById("note");
const addEntryBtn=document.getElementById("addEntry");

const entryMode=document.getElementById("entryMode");
const normalFields=document.getElementById("normalFields");
const transferFields=document.getElementById("transferFields");

const filterDate=document.getElementById("filterDate");

const todayBtn=document.getElementById("todayBtn");
const showDeletedBtn=document.getElementById("showDeletedBtn");
const showEditedBtn=document.getElementById("showEditedBtn");
const ssBtn=document.getElementById("ssBtn");

const tableBody=document.getElementById("tableBody");
const openingBalanceEl=document.getElementById("openingBalance");
const closingBalanceEl=document.getElementById("closingBalance");
const viewTitle=document.getElementById("viewTitle");

date.value=today();
filterDate.value=today();

entryMode.onchange=()=>{

if(entryMode.value==="transfer"){
normalFields.style.display="none";
transferFields.style.display="block";
}

else{
normalFields.style.display="block";
transferFields.style.display="none";
}

};

// --- FIXED BALANCE CALCULATION ---
function calculateBalances(){

let totalMasterBalance=0;

accounts.forEach(a=>{
totalMasterBalance+=Number(a.balance)||0;
});

let dayDr=0;
let dayCr=0;

entries.forEach(e=>{
if(e.date===filterDate.value){
if(e.type==="Dr") dayDr+=Number(e.amount)||0;
if(e.type==="Cr") dayCr+=Number(e.amount)||0;
}
});

// Opening Balance shows current total assets
openingBalanceEl.innerText=totalMasterBalance.toFixed(2);
// Closing Balance shows net change for the selected filter date
closingBalanceEl.innerText=(dayCr - dayDr).toFixed(2);

}

// --- CORE FIX: UPDATING ACCOUNT BALANCES IN FIRESTORE ---
async function updateAccountBalance(accName, entryType, entryAmount){

const acc=accounts.find(a=>a.name===accName);

if(!acc) {
    console.error("Account not found for update");
    return;
}

let currentBalance=Number(acc.balance)||0;
let changeAmount=Number(entryAmount)||0;
let newBalance=currentBalance;

// If money goes out (Dr), subtract from account balance
if(entryType==="Dr"){
newBalance=currentBalance - changeAmount;
}

// If money comes in (Cr), add to account balance
if(entryType==="Cr"){
newBalance=currentBalance + changeAmount;
}

await updateDoc(doc(db,"accounts",acc.id),{
balance:newBalance
});

}

addAccountBtn.onclick=async()=>{

if(!accountName.value||!accountAmount.value)return;

await addDoc(accountsCol,{
name:accountName.value,
balance:Number(accountAmount.value)||0
});

accountName.value="";
accountAmount.value="";

};

// --- FIXED ENTRY SUBMISSION ---
addEntryBtn.onclick=async()=>{

if(!amount.value || isNaN(amount.value)) {
    alert("Please enter a valid amount");
    return;
}

let amt=Number(amount.value);

if(entryMode.value==="normal"){

await addDoc(entriesCol,{
name:entryName.value,
purpose:purpose.value,
amount:amt,
accountName:accountSelect.value,
type:type.value,
date:date.value,
note:note.value
});

// CRITICAL FIX: Update the master account balance
await updateAccountBalance(accountSelect.value, type.value, amt);

}

else{

if(fromAccount.value===toAccount.value){
alert("Accounts cannot be same");
return;
}

// DR from the source account
await addDoc(entriesCol,{
name:entryName.value,
purpose:"Transfer to "+toAccount.value,
amount:amt,
accountName:fromAccount.value,
type:"Dr",
date:date.value,
note:note.value
});

// CR to the destination account
await addDoc(entriesCol,{
name:entryName.value,
purpose:"Transfer from "+fromAccount.value,
amount:amt,
accountName:toAccount.value,
type:"Cr",
date:date.value,
note:note.value
});

// CRITICAL FIX: Update both accounts involved in transfer
await updateAccountBalance(fromAccount.value, "Dr", amt);
await updateAccountBalance(toAccount.value, "Cr", amt);

}

entryName.value="";
purpose.value="";
amount.value="";
note.value="";

};

onSnapshot(accountsCol,snap=>{

accounts=[];

accountTable.innerHTML="";
accountSelect.innerHTML="";
fromAccount.innerHTML="";
toAccount.innerHTML="";

snap.forEach(d=>{
accounts.push({...d.data(),id:d.id});
});

accounts.sort((a,b) => a.name.localeCompare(b.name));

accounts.forEach(a=>{

accountSelect.innerHTML+=`<option value="${a.name}">${a.name}</option>`;
fromAccount.innerHTML+=`<option value="${a.name}">${a.name}</option>`;
toAccount.innerHTML+=`<option value="${a.name}">${a.name}</option>`;

accountTable.innerHTML+=`

<tr>
<td>${a.name}</td>
<td>${(Number(a.balance)||0).toFixed(2)}</td>
<td>

<button onclick="editAccount('${a.id}','${a.name}')">
Edit
</button>

<button onclick="deleteAccount('${a.id}')" style="background:red">
Delete
</button>

</td>
</tr>

`;

});

calculateBalances();

});

onSnapshot(entriesCol,snap=>{
entries=[];
snap.forEach(d=>{
entries.push({...d.data(),id:d.id});
});
render();
});

onSnapshot(deletedCol,snap=>{
deletedEntries=[];
snap.forEach(d=>{
deletedEntries.push(d.data());
});
});

onSnapshot(editedCol,snap=>{
editedEntries=[];
snap.forEach(d=>{
editedEntries.push(d.data());
});
});

function render(){

tableBody.innerHTML="";

if(viewMode==="entries"){

viewTitle.innerText="Entries";

entries.forEach(e=>{

if(e.date===filterDate.value){

tableBody.innerHTML+=`

<tr>

<td>${e.name}</td>
<td>${e.purpose}</td>
<td>${e.accountName}</td>

<td>${e.type==="Dr"?e.amount:""}</td>
<td>${e.type==="Cr"?e.amount:""}</td>

<td>${e.date}</td>
<td>${e.note}</td>

<td>

<button onclick="editEntry('${e.id}')">
Edit
</button>

<button onclick="deleteEntry('${e.id}')" style="background:red">
Delete
</button>

</td>

</tr>

`;

}

});

calculateBalances();

}

if(viewMode==="deleted"){

viewTitle.innerText="Deleted Entries";

deletedEntries.forEach(d=>{

if(d.date===filterDate.value){

tableBody.innerHTML+=`

<tr>

<td>${d.name}</td>
<td>${d.purpose}</td>
<td>${d.accountName||""}</td>

<td>${d.type==="Dr"?d.amount:""}</td>
<td>${d.type==="Cr"?d.amount:""}</td>

<td>${d.date}</td>
<td>${d.note||""}</td>

<td></td>

</tr>

`;

}

});

}

if(viewMode==="edited"){

viewTitle.innerText="Edited Entries";

editedEntries.forEach(e=>{

if(e.date===filterDate.value){

tableBody.innerHTML+=`

<tr>

<td>${e.name}</td>
<td>Before ${e.before}</td>
<td>${e.accountName||""}</td>

<td></td>

<td>After ${e.after}</td>

<td>${e.date}</td>

<td></td>

<td></td>

</tr>

`;

}

});

}

}

window.deleteEntry=async(id)=>{

const ref=doc(db,"entries",id);
const snap=await getDoc(ref);
const data=snap.data();

// Add to deleted collection
await addDoc(deletedCol,data);

// Reverse the account balance impact
// If it was Dr (out), add it back (Cr)
// If it was Cr (in), take it out (Dr)
await updateAccountBalance(
data.accountName,
data.type==="Dr"?"Cr":"Dr",
data.amount
);

await deleteDoc(ref);

};

window.editEntry=async(id)=>{

const ref=doc(db,"entries",id);
const snap=await getDoc(ref);
const old=snap.data();

let newAmt=prompt("New Amount",old.amount);

if(!newAmt || isNaN(newAmt))return;

// Logic: Revert old amount, then apply new amount
await updateAccountBalance(
old.accountName,
old.type==="Dr"?"Cr":"Dr",
old.amount
);

await updateAccountBalance(
old.accountName,
old.type,
newAmt
);

await addDoc(editedCol,{
name:old.name,
before:old.amount,
after:newAmt,
date:old.date
});

await updateDoc(ref,{
amount:Number(newAmt)||0
});

};

window.editAccount=async(id,name)=>{

let pass=prompt("Enter Password");

if(pass!==PASSWORD){
alert("Wrong Password");
return;
}

let newName=prompt("New Name",name);

if(!newName)return;

await updateDoc(doc(db,"accounts",id),{
name:newName
});

};

window.deleteAccount=async(id)=>{

let pass=prompt("Enter Password");

if(pass!==PASSWORD){
alert("Wrong Password");
return;
}

await deleteDoc(doc(db,"accounts",id));

};

todayBtn.onclick=()=>{
viewMode="entries";
filterDate.value=today();
render();
};

showDeletedBtn.onclick=()=>{
viewMode="deleted";
render();
};

showEditedBtn.onclick=()=>{
viewMode="edited";
render();
};

filterDate.onchange=()=>{
render();
};

ssBtn.onclick=async()=>{

let html=`

<h2>OFFICE DAYBOOK</h2>

<p>Date ${filterDate.value}</p>

<p>Total Assets ${openingBalanceEl.innerText}</p>

<h4>Account Balances</h4>

<table border="1" style="width:100%;border-collapse:collapse;">

<tr>
<th>Account</th>
<th>Balance</th>
</tr>

`;

accounts.forEach(a=>{
html+=`
<tr>
<td>${a.name}</td>
<td>${(Number(a.balance)||0).toFixed(2)}</td>
</tr>
`;
});

html+=`

</table>

<h4>Entries</h4>

<table border="1" style="width:100%;border-collapse:collapse;">

<tr>

<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
<th>Date</th>

</tr>

`;

entries.forEach(e=>{

if(e.date===filterDate.value){

html+=`

<tr>

<td>${e.name}</td>
<td>${e.purpose}</td>
<td>${e.accountName}</td>

<td>${e.type==="Dr"?e.amount:""}</td>
<td>${e.type==="Cr"?e.amount:""}</td>

<td>${e.date}</td>

</tr>

`;

}

});

html+=`

</table>

<p>Net Change ${closingBalanceEl.innerText}</p>

`;

let div=document.createElement("div");
div.style.background="#fff";
div.style.padding="20px";
div.innerHTML=html;

document.body.appendChild(div);

const canvas=await html2canvas(div,{scale:2});
const link=document.createElement("a");
link.download="daybook_"+filterDate.value+".png";
link.href=canvas.toDataURL();
link.click();
document.body.removeChild(div);

};

</script>

</body>
</html>
