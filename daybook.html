<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#f1f3f6;
}
.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}
h2{margin-bottom:20px;}
.top-grid{
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
}
.card{
    background:#fff;
    padding:18px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
    margin-bottom:20px;
}
input,select{
    padding:8px;
    margin:6px 6px 6px 0;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
}
button:hover{background:#0b5ed7;}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
th{background:#f8f9fa;}
.balance-row{
    margin-top:10px;
    font-weight:600;
}
.balance-highlight{
    color:#0d6efd;
    font-weight:600;
}

/* Hidden clean export layout */
#exportArea{
    position:absolute;
    left:-9999px;
    top:0;
    width:800px;
    background:white;
    padding:20px;
}
</style>
</head>
<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">
<h3>Add Account</h3>
<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>
<button id="addAccount">Add Account</button>

<hr>

<h4>Accounts</h4>
<table>
<thead>
<tr><th>Account</th><th>Balance</th></tr>
</thead>
<tbody id="accountTable"></tbody>
</table>
</div>

<div class="card">
<h3>Add Entry</h3>
<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Debit (Dr)</option>
<option value="Cr">Credit (Cr)</option>
</select>
<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add Entry</button>
</div>

</div>

<div class="card">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
<button id="ssBtn">SS</button>

<div class="balance-row">
Opening Balance: <span id="openingBalance">0.00</span>
</div>
</div>

<div class="card">
<h3>Entries</h3>
<table>
<thead>
<tr>
<th>Name</th><th>Purpose</th><th>Account</th>
<th>Amount</th><th>Type</th><th>Date</th><th>Note</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="balance-row">
Closing Balance: <span id="closingBalance">0.00</span>
</div>
</div>

</div>

<!-- CLEAN EXPORT AREA -->
<div id="exportArea"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.addEventListener("DOMContentLoaded",()=>{

const accountsCol = collection(db,"accounts");
const entriesCol = collection(db,"entries");

const accountName = document.getElementById("accountName");
const accountAmount = document.getElementById("accountAmount");
const addAccountBtn = document.getElementById("addAccount");
const accountTable = document.getElementById("accountTable");

const entryName = document.getElementById("entryName");
const purpose = document.getElementById("purpose");
const amount = document.getElementById("amount");
const date = document.getElementById("date");
const accountSelect = document.getElementById("accountSelect");
const type = document.getElementById("type");
const note = document.getElementById("note");
const addEntryBtn = document.getElementById("addEntry");

const filterDate = document.getElementById("filterDate");
const todayBtn = document.getElementById("todayBtn");
const ssBtn = document.getElementById("ssBtn");

const tableBody = document.getElementById("tableBody");
const openingBalanceEl = document.getElementById("openingBalance");
const closingBalanceEl = document.getElementById("closingBalance");

let accounts=[];
let entries=[];

function today(){
    return new Date().toISOString().split("T")[0];
}

date.value=today();
filterDate.value=today();

addAccountBtn.onclick=async()=>{
    if(!accountName.value || !accountAmount.value) return;
    await addDoc(accountsCol,{
        name:accountName.value,
        balance:parseFloat(accountAmount.value)
    });
    accountName.value="";
    accountAmount.value="";
};

addEntryBtn.onclick=async()=>{
    if(date.value!==today()) return;

    const acc=accounts[accountSelect.value];
    let newBalance=acc.balance;

    if(type.value==="Dr") newBalance-=parseFloat(amount.value);
    else newBalance+=parseFloat(amount.value);

    await updateDoc(doc(db,"accounts",acc.id),{balance:newBalance});

    await addDoc(entriesCol,{
        name:entryName.value,
        purpose:purpose.value,
        amount:parseFloat(amount.value),
        accountName:acc.name,
        type:type.value,
        date:date.value,
        note:note.value
    });

    entryName.value="";
    purpose.value="";
    amount.value="";
    note.value="";
};

todayBtn.onclick=()=>{
    filterDate.value=today();
    render();
};

filterDate.onchange=render;

onSnapshot(accountsCol,snap=>{
    accounts=[];
    accountSelect.innerHTML="";
    accountTable.innerHTML="";
    snap.forEach(d=>{
        accounts.push({...d.data(),id:d.id});
    });
    accounts.forEach((a,i)=>{
        accountSelect.innerHTML+=`<option value="${i}">${a.name}</option>`;
        accountTable.innerHTML+=`
        <tr>
        <td>${a.name}</td>
        <td class="balance-highlight">${a.balance.toFixed(2)}</td>
        </tr>`;
    });
    calculateBalances();
});

onSnapshot(entriesCol,snap=>{
    entries=[];
    snap.forEach(d=>{
        entries.push(d.data());
    });
    render();
});

function calculateBalances(){
    let selectedDate=filterDate.value;
    let opening=0;
    accounts.forEach(a=>opening+=a.balance);
    openingBalanceEl.innerText=opening.toFixed(2);

    let totalDr=0,totalCr=0;
    entries.filter(e=>e.date===selectedDate)
    .forEach(e=>{
        if(e.type==="Dr") totalDr+=e.amount;
        else totalCr+=e.amount;
    });

    let closing=opening+totalCr-totalDr;
    closingBalanceEl.innerText=closing.toFixed(2);
}

function render(){
    tableBody.innerHTML="";
    let selectedDate=filterDate.value;

    entries.filter(e=>e.date===selectedDate)
    .forEach(e=>{
        tableBody.innerHTML+=`
        <tr>
        <td>${e.name}</td>
        <td>${e.purpose}</td>
        <td>${e.accountName}</td>
        <td>${e.amount}</td>
        <td>${e.type}</td>
        <td>${e.date}</td>
        <td>${e.note}</td>
        </tr>`;
    });

    calculateBalances();
}

/* CLEAN IMAGE EXPORT */
ssBtn.onclick = async ()=>{

    let selectedDate = filterDate.value;

    let exportArea = document.getElementById("exportArea");

    let html = `
        <h2>OFFICE DAYBOOK</h2>
        <p>Date: ${selectedDate}</p>
        <p><strong>Opening Balance:</strong> ${openingBalanceEl.innerText}</p>
        <h3>Entries</h3>
        <table border="1" style="width:100%;border-collapse:collapse;">
        <tr>
        <th>Name</th><th>Purpose</th><th>Account</th>
        <th>Amount</th><th>Type</th><th>Date</th>
        </tr>
    `;

    entries.filter(e=>e.date===selectedDate)
    .forEach(e=>{
        html+=`
        <tr>
        <td>${e.name}</td>
        <td>${e.purpose}</td>
        <td>${e.accountName}</td>
        <td>${e.amount}</td>
        <td>${e.type}</td>
        <td>${e.date}</td>
        </tr>`;
    });

    html+=`</table>
    <p><strong>Closing Balance:</strong> ${closingBalanceEl.innerText}</p>
    <h3>Account Balances</h3>
    <ul>`;

    accounts.forEach(a=>{
        html+=`<li>${a.name} : ${a.balance.toFixed(2)}</li>`;
    });

    html+=`</ul>`;

    exportArea.innerHTML=html;

    const canvas=await html2canvas(exportArea,{scale:2});
    const link=document.createElement("a");
    link.download="daybook.png";
    link.href=canvas.toDataURL();
    link.click();
};

});

</script>

</body>
</html>
