<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daybook</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#eef1f5;
}
.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}

h2{margin-bottom:15px;}

.top-grid{
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

input,select{
    padding:6px 8px;
    margin:4px 4px 4px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:13px;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:#fff;
    font-size:13px;
    cursor:pointer;
}
button:hover{background:#084298;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}
th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
th{background:#f7f7f7;}

.bottom-section{
    margin-top:20px;
}

.badge-dr{color:red;font-weight:600;}
.badge-cr{color:green;font-weight:600;}

.flex-row{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
}
</style>
</head>
<body>

<div class="container">

<h2>DAYBOOK</h2>

<div class="top-grid">

<!-- LEFT: ADD ACCOUNT -->
<div class="card">
<h3>Add Account</h3>
<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>
<button id="addAccount">Add Account</button>
</div>

<!-- RIGHT: ADD ENTRY -->
<div class="card">
<h3>Add Entry</h3>
<div class="flex-row">
<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Dr</option>
<option value="Cr">Cr</option>
</select>
<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add</button>
</div>
</div>

</div>

<!-- FILTER -->
<div class="card" style="margin-top:20px;">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
<button id="showDeleted">Deleted Entries</button>
</div>

<!-- BOTTOM SECTION -->
<div class="bottom-section">

<div class="card">
<h3>Accounts</h3>
<table>
<thead>
<tr>
<th>Account</th>
<th>Opening</th>
<th>Closing</th>
<th>Action</th>
</tr>
</thead>
<tbody id="accountTable"></tbody>
</table>
</div>

<div class="card" style="margin-top:20px;">
<h3>Entries</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Amount</th>
<th>Type</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>
<tbody id="entryTable"></tbody>
</table>
</div>

<div class="card" id="deletedSection" style="display:none;margin-top:20px;">
<h3>Deleted Entries</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>
<tbody id="deletedTable"></tbody>
</table>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66",
  storageBucket: "mg-manager-3ab66.firebasestorage.app",
  messagingSenderId: "330667005987",
  appId: "1:330667005987:web:95de27b6259ace9fc6b996"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const accountsCol = collection(db,"accounts");
const entriesCol = collection(db,"entries");
const deletedCol = collection(db,"deleted");

let accounts=[];

function todayDate(){
    return new Date().toISOString().split("T")[0];
}

date.value=todayDate();
filterDate.value=todayDate();

todayBtn.onclick=()=>{filterDate.value=todayDate();};

addAccount.onclick=async()=>{
    if(!accountName.value||!accountAmount.value) return;
    await addDoc(accountsCol,{
        name:accountName.value,
        opening:parseFloat(accountAmount.value),
        balance:parseFloat(accountAmount.value)
    });
    accountName.value="";
    accountAmount.value="";
};

addEntry.onclick=async()=>{
    if(!entryName.value||!amount.value||!date.value) return;

    const acc=accounts[accountSelect.value];
    let newBalance=acc.balance;

    if(type.value==="Dr") newBalance-=parseFloat(amount.value);
    else newBalance+=parseFloat(amount.value);

    await updateDoc(doc(db,"accounts",acc.id),{balance:newBalance});

    await addDoc(entriesCol,{
        name:entryName.value,
        purpose:purpose.value,
        amount:parseFloat(amount.value),
        accountId:acc.id,
        accountName:acc.name,
        type:type.value,
        date:date.value,
        note:note.value
    });

    entryName.value="";
    purpose.value="";
    amount.value="";
    note.value="";
};

onSnapshot(accountsCol,(snap)=>{
    accounts=[];
    accountTable.innerHTML="";
    accountSelect.innerHTML="";
    snap.forEach(docu=>{
        const d=docu.data();
        accounts.push({...d,id:docu.id});
    });

    accounts.forEach((acc,i)=>{
        accountTable.innerHTML+=`
        <tr>
        <td>${acc.name}</td>
        <td>${acc.opening}</td>
        <td>${acc.balance}</td>
        <td>
        <button onclick="editAcc('${acc.id}')">Edit</button>
        <button onclick="delAcc('${acc.id}')">Delete</button>
        </td>
        </tr>`;

        accountSelect.innerHTML+=`<option value="${i}">${acc.name}</option>`;
    });
});

onSnapshot(entriesCol,(snap)=>{
    entryTable.innerHTML="";
    snap.forEach(docu=>{
        const e=docu.data();
        if(filterDate.value && e.date!==filterDate.value) return;

        entryTable.innerHTML+=`
        <tr>
        <td>${e.name}</td>
        <td>${e.purpose}</td>
        <td>${e.accountName}</td>
        <td>${e.amount}</td>
        <td class="${e.type==="Dr"?"badge-dr":"badge-cr"}">${e.type}</td>
        <td>${e.date}</td>
        <td>${e.note}</td>
        <td><button onclick="deleteEntry('${docu.id}')">Delete</button></td>
        </tr>`;
    });
});

window.deleteEntry=async(id)=>{
    const entryRef=doc(db,"entries",id);
    const snap=await getDoc(entryRef);
    await addDoc(deletedCol,snap.data());
    await deleteDoc(entryRef);
};

window.editAcc=async(id)=>{
    const pass=prompt("Password");
    if(pass!=="BNPRATHAM@8056079200") return alert("Wrong Password");
    const newBal=prompt("New Balance");
    await updateDoc(doc(db,"accounts",id),{balance:parseFloat(newBal)});
};

window.delAcc=async(id)=>{
    const pass=prompt("Password");
    if(pass!=="BNPRATHAM@8056079200") return alert("Wrong Password");
    await deleteDoc(doc(db,"accounts",id));
};

showDeleted.onclick=()=>{
    deletedSection.style.display="block";
    onSnapshot(deletedCol,(snap)=>{
        deletedTable.innerHTML="";
        snap.forEach(d=>{
            const e=d.data();
            deletedTable.innerHTML+=`
            <tr>
            <td>${e.name}</td>
            <td>${e.purpose}</td>
            <td>${e.amount}</td>
            <td>${e.date}</td>
            </tr>`;
        });
    });
};

</script>
</body>
</html>
