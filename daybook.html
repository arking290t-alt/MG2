<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#eef2f6;
}
.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}
h2{margin-bottom:15px;}

.top-grid{
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

input,select{
    padding:6px 8px;
    margin:4px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:13px;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:#fff;
    font-size:13px;
    cursor:pointer;
}
button:hover{background:#084298;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}
th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
th{background:#f5f5f5;}

.badge-dr{color:red;font-weight:600;}
.badge-cr{color:green;font-weight:600;}
.section-title{margin-top:10px;font-weight:600;}
</style>
</head>
<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">
<h3>Add Account</h3>
<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>
<button id="addAccount">Add Account</button>
</div>

<div class="card">
<h3>Add Entry</h3>
<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Dr</option>
<option value="Cr">Cr</option>
</select>
<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add</button>
</div>

</div>

<div class="card">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
</div>

<div class="card">
<div class="section-title">Entries</div>
<table>
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Amount</th>
<th>Type</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>
<tbody id="entryTable"></tbody>
</table>
</div>

<div class="card">
<div class="section-title">Deleted Entries</div>
<input type="date" id="deletedFilter">
<table>
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>
<tbody id="deletedTable"></tbody>
</table>
</div>

<div class="card">
<div class="section-title">Edited Entries</div>
<input type="date" id="editedFilter">
<table>
<thead>
<tr>
<th>Name</th>
<th>Before</th>
<th>After</th>
<th>Date</th>
</tr>
</thead>
<tbody id="editedTable"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const accountsCol = collection(db,"accounts");
const entriesCol = collection(db,"entries");
const deletedCol = collection(db,"deletedEntries");
const editedCol = collection(db,"editedEntries");

let accounts=[];
let entries=[];

function today(){
    return new Date().toISOString().split("T")[0];
}

date.value = today();
filterDate.value = today();

todayBtn.onclick = ()=>{
    filterDate.value = today();
    renderEntries();
};

addAccount.onclick = async()=>{
    if(!accountName.value || !accountAmount.value) return;
    await addDoc(accountsCol,{
        name:accountName.value,
        balance:parseFloat(accountAmount.value)
    });
    accountName.value="";
    accountAmount.value="";
};

addEntry.onclick = async()=>{
    if(date.value !== today()){
        alert("Cannot add entry to past date");
        return;
    }

    const acc = accounts[accountSelect.value];
    let newBalance = acc.balance;

    if(type.value==="Dr") newBalance -= parseFloat(amount.value);
    else newBalance += parseFloat(amount.value);

    await updateDoc(doc(db,"accounts",acc.id),{balance:newBalance});

    await addDoc(entriesCol,{
        name:entryName.value,
        purpose:purpose.value,
        amount:parseFloat(amount.value),
        accountId:acc.id,
        accountName:acc.name,
        type:type.value,
        date:date.value,
        note:note.value
    });

    entryName.value="";
    purpose.value="";
    amount.value="";
    note.value="";
};

onSnapshot(accountsCol,(snap)=>{
    accounts=[];
    accountSelect.innerHTML="";
    snap.forEach(d=>{
        accounts.push({...d.data(),id:d.id});
    });
    accounts.forEach((acc,i)=>{
        accountSelect.innerHTML+=`<option value="${i}">${acc.name}</option>`;
    });
});

onSnapshot(entriesCol,(snap)=>{
    entries=[];
    snap.forEach(d=>{
        entries.push({...d.data(),id:d.id});
    });
    renderEntries();
});

function renderEntries(){
    entryTable.innerHTML="";
    let selectedDate = filterDate.value;

    entries.filter(e=>e.date===selectedDate)
    .forEach(e=>{
        let editBtn = e.date===today() ? 
        `<button onclick="editEntry('${e.id}')">Edit</button>` : "";

        entryTable.innerHTML+=`
        <tr>
        <td>${e.name}</td>
        <td>${e.purpose}</td>
        <td>${e.accountName}</td>
        <td>${e.amount}</td>
        <td class="${e.type==="Dr"?"badge-dr":"badge-cr"}">${e.type}</td>
        <td>${e.date}</td>
        <td>${e.note}</td>
        <td>
            ${editBtn}
            <button onclick="deleteEntry('${e.id}')">Delete</button>
        </td>
        </tr>`;
    });
}

window.deleteEntry = async(id)=>{
    const ref = doc(db,"entries",id);
    const snap = await getDoc(ref);

    await addDoc(deletedCol,snap.data());
    await deleteDoc(ref);
};

window.editEntry = async(id)=>{
    const ref = doc(db,"entries",id);
    const snap = await getDoc(ref);
    const oldData = snap.data();

    if(oldData.date !== today()){
        alert("Cannot edit past date");
        return;
    }

    let newAmount = prompt("New Amount", oldData.amount);
    if(!newAmount) return;

    await addDoc(editedCol,{
        name:oldData.name,
        before:oldData.amount,
        after:newAmount,
        date:oldData.date
    });

    await updateDoc(ref,{amount:parseFloat(newAmount)});
};

deletedFilter.onchange = ()=>{
    deletedTable.innerHTML="";
    onSnapshot(deletedCol,(snap)=>{
        snap.forEach(d=>{
            if(d.data().date===deletedFilter.value){
                let e=d.data();
                deletedTable.innerHTML+=`
                <tr>
                <td>${e.name}</td>
                <td>${e.purpose}</td>
                <td>${e.amount}</td>
                <td>${e.date}</td>
                </tr>`;
            }
        });
    });
};

editedFilter.onchange = ()=>{
    editedTable.innerHTML="";
    onSnapshot(editedCol,(snap)=>{
        snap.forEach(d=>{
            if(d.data().date===editedFilter.value){
                let e=d.data();
                editedTable.innerHTML+=`
                <tr>
                <td>${e.name}</td>
                <td>${e.before}</td>
                <td>${e.after}</td>
                <td>${e.date}</td>
                </tr>`;
            }
        });
    });
};

</script>

</body>
</html>
