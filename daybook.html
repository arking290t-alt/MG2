<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f1f3f6;}
.container{width:95%;margin:auto;margin-top:20px;}
h2{margin-bottom:20px;}
.top-grid{display:grid;grid-template-columns:1fr 2fr;gap:20px;}
.card{background:#fff;padding:18px;border-radius:10px;box-shadow:0 3px 8px rgba(0,0,0,0.08);margin-bottom:20px;}
input,select{padding:8px;margin:6px 6px 6px 0;border-radius:6px;border:1px solid #ccc;}
button{padding:6px 10px;border:none;border-radius:6px;background:#0d6efd;color:white;cursor:pointer;font-size:13px;}
button:hover{background:#0b5ed7;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:center;}
th{background:#f8f9fa;}
.balance-row{margin-top:10px;font-weight:600;}
.balance-highlight{color:#0d6efd;font-weight:600;}
#exportArea{position:absolute;left:-9999px;top:0;width:900px;background:white;padding:25px;}
</style>
</head>
<body>

<div class="container">
<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">
<h3>Add Account</h3>
<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>
<button id="addAccount">Add Account</button>

<hr>

<h4>Accounts</h4>
<table>
<thead>
<tr><th>Account</th><th>Balance</th><th>Action</th></tr>
</thead>
<tbody id="accountTable"></tbody>
</table>
</div>

<div class="card">
<h3>Add Entry</h3>
<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Debit (Dr)</option>
<option value="Cr">Credit (Cr)</option>
</select>
<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add Entry</button>
</div>

</div>

<div class="card">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
<button id="showEntries">Entries</button>
<button id="showDeleted">Deleted</button>
<button id="showEdited">Edited</button>
<button id="ssBtn">SS</button>

<div class="balance-row">
Opening Balance: <span id="openingBalance">0.00</span>
</div>
</div>

<div class="card">
<h3 id="tableTitle">Entries</h3>
<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>
<div class="balance-row">
Closing Balance: <span id="closingBalance">0.00</span>
</div>
</div>

</div>

<div id="exportArea"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const PASSWORD="BNPRATHAM@8056079200";

const firebaseConfig={
apiKey:"AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
authDomain:"mg-manager-3ab66.firebaseapp.com",
projectId:"mg-manager-3ab66"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const accountsCol=collection(db,"accounts");
const entriesCol=collection(db,"entries");
const deletedCol=collection(db,"deletedEntries");
const editedCol=collection(db,"editedEntries");
const dailyCol=collection(db,"dailySummary");

let accounts=[],entries=[],deletedEntries=[],editedEntries=[];
let mode="entries";

function today(){return new Date().toISOString().split("T")[0];}
function yesterday(){
let d=new Date();
d.setDate(d.getDate()-1);
return d.toISOString().split("T")[0];
}

const accountName=document.getElementById("accountName");
const accountAmount=document.getElementById("accountAmount");
const addAccountBtn=document.getElementById("addAccount");
const accountTable=document.getElementById("accountTable");
const accountSelect=document.getElementById("accountSelect");

const entryName=document.getElementById("entryName");
const purpose=document.getElementById("purpose");
const amount=document.getElementById("amount");
const date=document.getElementById("date");
const type=document.getElementById("type");
const note=document.getElementById("note");
const addEntryBtn=document.getElementById("addEntry");

const filterDate=document.getElementById("filterDate");
const todayBtn=document.getElementById("todayBtn");
const showEntriesBtn=document.getElementById("showEntries");
const showDeletedBtn=document.getElementById("showDeleted");
const showEditedBtn=document.getElementById("showEdited");
const ssBtn=document.getElementById("ssBtn");

const tableHead=document.getElementById("tableHead");
const tableBody=document.getElementById("tableBody");
const tableTitle=document.getElementById("tableTitle");
const openingBalanceEl=document.getElementById("openingBalance");
const closingBalanceEl=document.getElementById("closingBalance");

date.value=today();
filterDate.value=today();

async function ensureDailyOpening(){
const todayRef=doc(db,"dailySummary",today());
const todaySnap=await getDoc(todayRef);
if(!todaySnap.exists()){
const yesterdayRef=doc(db,"dailySummary",yesterday());
const ySnap=await getDoc(yesterdayRef);
let opening=0;
if(ySnap.exists())opening=ySnap.data().closing;
await setDoc(todayRef,{date:today(),opening:opening,closing:opening});
}
}

async function updateClosing(){
const todayRef=doc(db,"dailySummary",filterDate.value);
let totalDr=0,totalCr=0;
entries.filter(e=>e.date===filterDate.value)
.forEach(e=>{
if(e.type==="Dr")totalDr+=e.amount;
else totalCr+=e.amount;
});
const snap=await getDoc(todayRef);
if(snap.exists()){
let opening=snap.data().opening;
let closing=opening+totalCr-totalDr;
await updateDoc(todayRef,{closing:closing});
closingBalanceEl.innerText=closing.toFixed(2);
openingBalanceEl.innerText=opening.toFixed(2);
}
}

addAccountBtn.onclick=async()=>{
if(!accountName.value||!accountAmount.value)return;
await addDoc(accountsCol,{name:accountName.value,balance:parseFloat(accountAmount.value)});
accountName.value="";accountAmount.value="";
};

addEntryBtn.onclick=async()=>{
if(date.value!==today()){alert("Cannot add past entry");return;}
await ensureDailyOpening();
await addDoc(entriesCol,{
name:entryName.value,
purpose:purpose.value,
amount:parseFloat(amount.value),
accountName:accountSelect.options[accountSelect.selectedIndex].text,
type:type.value,
date:date.value,
note:note.value
});
entryName.value="";purpose.value="";amount.value="";note.value="";
};

todayBtn.onclick=()=>{filterDate.value=today();render();};
filterDate.onchange=render;
showEntriesBtn.onclick=()=>{mode="entries";render();};
showDeletedBtn.onclick=()=>{mode="deleted";render();};
showEditedBtn.onclick=()=>{mode="edited";render();};

onSnapshot(accountsCol,snap=>{
accounts=[];accountTable.innerHTML="";accountSelect.innerHTML="";
snap.forEach(d=>accounts.push({...d.data(),id:d.id}));
accounts.forEach((a,i)=>{
accountSelect.innerHTML+=`<option value="${i}">${a.name}</option>`;
accountTable.innerHTML+=`
<tr>
<td>${a.name}</td>
<td class="balance-highlight">${a.balance.toFixed(2)}</td>
<td>
<button onclick="editAccount('${a.id}','${a.name}')">Edit</button>
<button onclick="deleteAccount('${a.id}')">Delete</button>
</td>
</tr>`;
});
});

onSnapshot(entriesCol,snap=>{
entries=[];snap.forEach(d=>entries.push({...d.data(),id:d.id}));render();
});
onSnapshot(deletedCol,snap=>{
deletedEntries=[];snap.forEach(d=>deletedEntries.push(d.data()));
});
onSnapshot(editedCol,snap=>{
editedEntries=[];snap.forEach(d=>editedEntries.push(d.data()));
});

function render(){
tableBody.innerHTML="";
if(mode==="entries"){
tableTitle.innerText="Entries";
tableHead.innerHTML=`<tr>
<th>Name</th><th>Purpose</th><th>Account</th>
<th>Debit</th><th>Credit</th><th>Date</th><th>Note</th></tr>`;
entries.filter(e=>e.date===filterDate.value)
.forEach(e=>{
tableBody.innerHTML+=`
<tr>
<td>${e.name}</td>
<td>${e.purpose}</td>
<td>${e.accountName}</td>
<td>${e.type==="Dr"?e.amount:""}</td>
<td>${e.type==="Cr"?e.amount:""}</td>
<td>${e.date}</td>
<td>${e.note}</td>
</tr>`;
});
}
updateClosing();
}

window.editAccount=async(id,name)=>{
let pass=prompt("Enter Password");
if(pass!==PASSWORD){alert("Wrong Password");return;}
let newName=prompt("New Name",name);
if(!newName)return;
await updateDoc(doc(db,"accounts",id),{name:newName});
};

window.deleteAccount=async(id)=>{
let pass=prompt("Enter Password");
if(pass!==PASSWORD){alert("Wrong Password");return;}
await deleteDoc(doc(db,"accounts",id));
};

ssBtn.onclick=async()=>{
let exportArea=document.getElementById("exportArea");
let html=`<h2>OFFICE DAYBOOK</h2>
<p>Date: ${filterDate.value}</p>
<p><strong>Opening Balance:</strong> ${openingBalanceEl.innerText}</p>
<table border="1" style="width:100%;border-collapse:collapse;">
<tr><th>Name</th><th>Purpose</th><th>Account</th><th>Debit</th><th>Credit</th></tr>`;
entries.filter(e=>e.date===filterDate.value)
.forEach(e=>{
html+=`<tr>
<td>${e.name}</td>
<td>${e.purpose}</td>
<td>${e.accountName}</td>
<td>${e.type==="Dr"?e.amount:""}</td>
<td>${e.type==="Cr"?e.amount:""}</td>
</tr>`;
});
html+=`</table>
<p><strong>Closing Balance:</strong> ${closingBalanceEl.innerText}</p>`;
exportArea.innerHTML=html;
const canvas=await html2canvas(exportArea,{scale:2});
const link=document.createElement("a");
link.download="daybook.png";
link.href=canvas.toDataURL();
link.click();
};

ensureDailyOpening();

});
</script>
</body>
</html>
