<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#f1f3f6;
}
.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}
h2{
    margin-bottom:20px;
}
.top-grid{
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
}
.card{
    background:#fff;
    padding:18px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
}
input,select{
    padding:8px;
    margin:6px 6px 6px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}
button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:white;
    font-size:14px;
    cursor:pointer;
}
button:hover{
    background:#0b5ed7;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
th{
    background:#f8f9fa;
}
.header-row{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}
.section-title{
    font-weight:600;
    margin-bottom:10px;
}
.balance-highlight{
    font-weight:600;
    color:#0d6efd;
}
</style>
</head>
<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">
<h3>Add Account</h3>
<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>
<button id="addAccount">Add Account</button>

<hr>

<div class="section-title">Accounts</div>
<table>
<thead>
<tr>
<th>Account</th>
<th>Balance</th>
</tr>
</thead>
<tbody id="accountTable"></tbody>
</table>
</div>

<div class="card">
<h3>Add Entry</h3>
<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Debit (Dr)</option>
<option value="Cr">Credit (Cr)</option>
</select>
<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add Entry</button>
</div>

</div>

<div class="card" style="margin-top:20px;">
<div class="header-row">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
<button id="showEntries">Entries</button>
<button id="showDeleted">Deleted</button>
<button id="showEdited">Edited</button>
</div>
</div>

<div class="card">
<div class="section-title" id="tableTitle">Entries</div>
<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.addEventListener("DOMContentLoaded",()=>{

const accountsCol = collection(db,"accounts");
const entriesCol = collection(db,"entries");
const deletedCol = collection(db,"deletedEntries");
const editedCol = collection(db,"editedEntries");

const accountName = document.getElementById("accountName");
const accountAmount = document.getElementById("accountAmount");
const addAccountBtn = document.getElementById("addAccount");
const accountTable = document.getElementById("accountTable");

const entryName = document.getElementById("entryName");
const purpose = document.getElementById("purpose");
const amount = document.getElementById("amount");
const date = document.getElementById("date");
const accountSelect = document.getElementById("accountSelect");
const type = document.getElementById("type");
const note = document.getElementById("note");
const addEntryBtn = document.getElementById("addEntry");

const filterDate = document.getElementById("filterDate");
const todayBtn = document.getElementById("todayBtn");
const showEntriesBtn = document.getElementById("showEntries");
const showDeletedBtn = document.getElementById("showDeleted");
const showEditedBtn = document.getElementById("showEdited");

const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");
const tableTitle = document.getElementById("tableTitle");

let accounts=[];
let entries=[];
let deletedEntries=[];
let editedEntries=[];
let mode="entries";

function today(){
    return new Date().toISOString().split("T")[0];
}

date.value=today();
filterDate.value=today();

addAccountBtn.onclick=async()=>{
    if(!accountName.value || !accountAmount.value) return;
    await addDoc(accountsCol,{
        name:accountName.value,
        balance:parseFloat(accountAmount.value)
    });
    accountName.value="";
    accountAmount.value="";
};

addEntryBtn.onclick=async()=>{
    if(date.value!==today()){
        alert("Cannot add entry to past date");
        return;
    }
    if(!entryName.value || !amount.value) return;

    const acc=accounts[accountSelect.value];
    let newBalance=acc.balance;

    if(type.value==="Dr") newBalance-=parseFloat(amount.value);
    else newBalance+=parseFloat(amount.value);

    await updateDoc(doc(db,"accounts",acc.id),{balance:newBalance});

    await addDoc(entriesCol,{
        name:entryName.value,
        purpose:purpose.value,
        amount:parseFloat(amount.value),
        accountName:acc.name,
        type:type.value,
        date:date.value,
        note:note.value
    });

    entryName.value="";
    purpose.value="";
    amount.value="";
    note.value="";
};

todayBtn.onclick=()=>{
    filterDate.value=today();
    render();
};

showEntriesBtn.onclick=()=>{mode="entries";render();};
showDeletedBtn.onclick=()=>{mode="deleted";render();};
showEditedBtn.onclick=()=>{mode="edited";render();};

filterDate.onchange=render;

onSnapshot(accountsCol,snap=>{
    accounts=[];
    accountSelect.innerHTML="";
    accountTable.innerHTML="";
    snap.forEach(d=>{
        accounts.push({...d.data(),id:d.id});
    });
    accounts.forEach((a,i)=>{
        accountSelect.innerHTML+=`<option value="${i}">${a.name}</option>`;
        accountTable.innerHTML+=`
        <tr>
        <td>${a.name}</td>
        <td class="balance-highlight">${a.balance.toFixed(2)}</td>
        </tr>`;
    });
});

onSnapshot(entriesCol,snap=>{
    entries=[];
    snap.forEach(d=>{
        entries.push({...d.data(),id:d.id});
    });
    render();
});

onSnapshot(deletedCol,snap=>{
    deletedEntries=[];
    snap.forEach(d=>{
        deletedEntries.push(d.data());
    });
});

onSnapshot(editedCol,snap=>{
    editedEntries=[];
    snap.forEach(d=>{
        editedEntries.push(d.data());
    });
});

function render(){
    tableBody.innerHTML="";
    let selectedDate=filterDate.value;

    if(mode==="entries"){
        tableTitle.innerText="Entries";
        tableHead.innerHTML=`
        <tr>
        <th>Name</th>
        <th>Purpose</th>
        <th>Account</th>
        <th>Amount</th>
        <th>Type</th>
        <th>Date</th>
        <th>Note</th>
        <th>Action</th>
        </tr>`;

        entries.filter(e=>e.date===selectedDate)
        .forEach(e=>{
            let editBtn=e.date===today()?
            `<button onclick="editEntry('${e.id}')">Edit</button>`:"";

            tableBody.innerHTML+=`
            <tr>
            <td>${e.name}</td>
            <td>${e.purpose}</td>
            <td>${e.accountName}</td>
            <td>${e.amount}</td>
            <td>${e.type}</td>
            <td>${e.date}</td>
            <td>${e.note}</td>
            <td>
            ${editBtn}
            <button onclick="deleteEntry('${e.id}')">Delete</button>
            </td>
            </tr>`;
        });
    }

    if(mode==="deleted"){
        tableTitle.innerText="Deleted Entries";
        tableHead.innerHTML=`<tr>
        <th>Name</th><th>Purpose</th><th>Amount</th><th>Date</th></tr>`;

        deletedEntries.filter(e=>e.date===selectedDate)
        .forEach(e=>{
            tableBody.innerHTML+=`
            <tr>
            <td>${e.name}</td>
            <td>${e.purpose}</td>
            <td>${e.amount}</td>
            <td>${e.date}</td>
            </tr>`;
        });
    }

    if(mode==="edited"){
        tableTitle.innerText="Edited Entries";
        tableHead.innerHTML=`<tr>
        <th>Name</th><th>Before</th><th>After</th><th>Date</th></tr>`;

        editedEntries.filter(e=>e.date===selectedDate)
        .forEach(e=>{
            tableBody.innerHTML+=`
            <tr>
            <td>${e.name}</td>
            <td>${e.before}</td>
            <td>${e.after}</td>
            <td>${e.date}</td>
            </tr>`;
        });
    }
}

window.deleteEntry=async(id)=>{
    const ref=doc(db,"entries",id);
    const snap=await getDoc(ref);
    await addDoc(deletedCol,snap.data());
    await deleteDoc(ref);
};

window.editEntry=async(id)=>{
    const ref=doc(db,"entries",id);
    const snap=await getDoc(ref);
    const oldData=snap.data();

    if(oldData.date!==today()){
        alert("Cannot edit past date");
        return;
    }

    let newAmount=prompt("New Amount",oldData.amount);
    if(!newAmount) return;

    await addDoc(editedCol,{
        name:oldData.name,
        before:oldData.amount,
        after:newAmount,
        date:oldData.date
    });

    await updateDoc(ref,{amount:parseFloat(newAmount)});
};

});

</script>

</body>
</html>
