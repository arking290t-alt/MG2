<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
}

.container{
width:95%;
margin:auto;
margin-top:20px;
}

h2{
margin-bottom:20px;
}

.top-grid{
display:grid;
grid-template-columns:1fr 2fr;
gap:20px;
}

.card{
background:#fff;
padding:18px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
margin-bottom:20px;
}

input,select{
padding:8px;
margin:6px 6px 6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#0d6efd;
color:white;
cursor:pointer;
font-size:13px;
margin-right: 5px;
}

button:hover{
background:#0b5ed7;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#f8f9fa;
}

.balance-row{
margin-top:12px;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">

<h3>Add Account</h3>

<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>

<button id="addAccount">Add Account</button>

<hr>

<h4>Accounts</h4>

<table>

<thead>
<tr>
<th>Account</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>

<tbody id="accountTable"></tbody>

</table>

</div>

<div class="card">

<h3>Add Entry</h3>

<select id="entryMode">
<option value="normal">Normal Entry</option>
<option value="transfer">Inter Account Transfer</option>
</select><br>

<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date"><br>

<div id="normalFields">

<select id="accountSelect"></select>

<select id="type">
<option value="Dr">Debit (Dr)</option>
<option value="Cr">Credit (Cr)</option>
</select>

</div>

<div id="transferFields" style="display:none">

From
<select id="fromAccount"></select>

To
<select id="toAccount"></select>

</div><br>

<input type="text" id="note" placeholder="Note">

<button id="addEntry">Add Entry</button>

</div>

</div>

<div class="card">

<input type="date" id="filterDate">

<button id="todayBtn">Today</button>
<button id="showDeletedBtn">Deleted</button>
<button id="showEditedBtn">Edited</button>
<button id="ssBtn">SS</button>
<button id="toggleBalanceBtn" style="background:#6c757d;">Show Balance</button>

<div class="balance-row">
Opening Balance (Start of Day): 
<span id="openingBalance">********</span>
</div>

</div>

<div class="card">

<h3 id="viewTitle">Entries</h3>

<table>

<thead>

<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="balance-row">
Closing Balance (End of Day): 
<span id="closingBalance">********</span>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
updateDoc,
deleteDoc,
doc,
onSnapshot,
getDoc
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
authDomain:"mg-manager-3ab66.firebaseapp.com",
projectId:"mg-manager-3ab66"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const PASSWORD="BNPRATHAM@8056079200";
const BALANCE_PIN = "816400";

let balancesVisible = false;

function today(){
return new Date().toISOString().split("T")[0];
}

const accountsCol=collection(db,"accounts");
const entriesCol=collection(db,"entries");
const deletedCol=collection(db,"deletedEntries");
const editedCol=collection(db,"editedEntries");

let accounts=[];
let entries=[];
let deletedEntries=[];
let editedEntries=[];
let viewMode="entries";

const accountName=document.getElementById("accountName");
const accountAmount=document.getElementById("accountAmount");
const addAccountBtn=document.getElementById("addAccount");
const accountTable=document.getElementById("accountTable");
const accountSelect=document.getElementById("accountSelect");
const fromAccount=document.getElementById("fromAccount");
const toAccount=document.getElementById("toAccount");

const entryName=document.getElementById("entryName");
const purpose=document.getElementById("purpose");
const amount=document.getElementById("amount");
const date=document.getElementById("date");
const type=document.getElementById("type");
const note=document.getElementById("note");
const addEntryBtn=document.getElementById("addEntry");

const entryMode=document.getElementById("entryMode");
const normalFields=document.getElementById("normalFields");
const transferFields=document.getElementById("transferFields");

const filterDate=document.getElementById("filterDate");

const todayBtn=document.getElementById("todayBtn");
const showDeletedBtn=document.getElementById("showDeletedBtn");
const showEditedBtn=document.getElementById("showEditedBtn");
const ssBtn=document.getElementById("ssBtn");
const toggleBalanceBtn = document.getElementById("toggleBalanceBtn");

const tableBody=document.getElementById("tableBody");
const openingBalanceEl=document.getElementById("openingBalance");
const closingBalanceEl=document.getElementById("closingBalance");
const viewTitle=document.getElementById("viewTitle");

date.value=today();
filterDate.value=today();

// --- BALANCE TOGGLE ---

toggleBalanceBtn.onclick = () => {

if (!balancesVisible) {

let pin = prompt("Enter PIN to show balances:");

if (pin === BALANCE_PIN) {
balancesVisible = true;
toggleBalanceBtn.innerText = "Hide Balance";
toggleBalanceBtn.style.background = "#198754";
renderAll();
} else {
alert("Incorrect PIN");
}

} else {

balancesVisible = false;
toggleBalanceBtn.innerText = "Show Balance";
toggleBalanceBtn.style.background = "#6c757d";
renderAll();

}

};

function renderAll() {
renderAccounts();
render();
calculateBalances();
}

entryMode.onchange = () => {

if(entryMode.value==="transfer"){
normalFields.style.display="none";
transferFields.style.display="block";
}else{
normalFields.style.display="block";
transferFields.style.display="none";
}

};


// ─────────────────────────────────────────────────────────────────
// HISTORICAL BALANCE CALCULATION
// Logic: Start from current real balance of each account,
// then UNDO all entries that happened AFTER the target date
// to get the balance as it was at end of that date.
// ─────────────────────────────────────────────────────────────────

function getHistoricalBalanceForAccount(accName, targetDate) {

  const acc = accounts.find(a => a.name === accName);
  if (!acc) return 0;

  let balance = Number(acc.balance) || 0;

  // Undo all entries strictly after the target date
  entries.forEach(e => {
    if (e.accountName === accName && e.date > targetDate) {
      if (e.type === "Dr") balance += Number(e.amount); // undo debit = add back
      if (e.type === "Cr") balance -= Number(e.amount); // undo credit = subtract
    }
  });

  return balance;
}

function getTotalHistoricalBalance(targetDate) {
  return accounts.reduce((sum, a) => {
    return sum + getHistoricalBalanceForAccount(a.name, targetDate);
  }, 0);
}


// BALANCE CALCULATION (Opening & Closing for selected date)

function calculateBalances(){

  const targetDate = filterDate.value;

  // Closing balance = sum of all account balances at END of targetDate
  let closingBalance = getTotalHistoricalBalance(targetDate);

  // Opening balance = closing minus the net change that happened ON that day
  let netChangeOnDay = 0;

  entries.forEach(e => {
    if (e.date === targetDate) {
      if (e.type === "Cr") netChangeOnDay += Number(e.amount);
      if (e.type === "Dr") netChangeOnDay -= Number(e.amount);
    }
  });

  let openingBalance = closingBalance - netChangeOnDay;

  openingBalanceEl.innerText = balancesVisible ? openingBalance.toFixed(2) : "********";
  closingBalanceEl.innerText = balancesVisible ? closingBalance.toFixed(2) : "********";

}


// ACCOUNT BALANCE UPDATE (always updates real/current balance)

async function updateAccountBalance(accName, actionType, actionAmount){

  const acc = accounts.find(a => a.name === accName);
  if (!acc) return;

  let current = Number(acc.balance) || 0;
  let change = Number(actionAmount) || 0;
  let final = (actionType === "Dr") ? (current - change) : (current + change);

  await updateDoc(doc(db, "accounts", acc.id), {
    balance: final
  });

}


// ADD ACCOUNT

addAccountBtn.onclick = async()=>{

if(!accountName.value || !accountAmount.value) return;

await addDoc(accountsCol,{
name:accountName.value,
balance:Number(accountAmount.value)||0
});

accountName.value="";
accountAmount.value="";

};


// ADD ENTRY

addEntryBtn.onclick = async()=>{

if(!amount.value) return;

let amt = Number(amount.value)||0;

if(entryMode.value==="normal"){

await addDoc(entriesCol,{
name:entryName.value,
purpose:purpose.value,
amount:amt,
accountName:accountSelect.value,
type:type.value,
date:date.value,
note:note.value
});

await updateAccountBalance(accountSelect.value,type.value,amt);

}

else{

if(fromAccount.value===toAccount.value){
alert("Accounts cannot be same");
return;
}

const fromAcc = fromAccount.value;
const toAcc = toAccount.value;

await addDoc(entriesCol,{
name:entryName.value,
purpose:"Transfer to "+toAcc,
amount:amt,
accountName:fromAcc,
type:"Dr",
date:date.value,
note:note.value
});

await addDoc(entriesCol,{
name:entryName.value,
purpose:"Transfer from "+fromAcc,
amount:amt,
accountName:toAcc,
type:"Cr",
date:date.value,
note:note.value
});

await updateAccountBalance(fromAcc,"Dr",amt);
await updateAccountBalance(toAcc,"Cr",amt);

}

entryName.value="";
purpose.value="";
amount.value="";
note.value="";

};


// FIREBASE SNAPSHOTS

onSnapshot(accountsCol,snap=>{

accounts=[];

snap.forEach(d=>{
accounts.push({...d.data(),id:d.id});
});

renderAccounts();
calculateBalances();

});


// ─────────────────────────────────────────────────────────────────
// RENDER ACCOUNTS — shows HISTORICAL balance for selected date
// ─────────────────────────────────────────────────────────────────

function renderAccounts(){

  accountTable.innerHTML="";
  accountSelect.innerHTML="";
  fromAccount.innerHTML="";
  toAccount.innerHTML="";

  const targetDate = filterDate.value;

  accounts.forEach(a=>{

    accountSelect.innerHTML += `<option value="${a.name}">${a.name}</option>`;
    fromAccount.innerHTML += `<option value="${a.name}">${a.name}</option>`;
    toAccount.innerHTML += `<option value="${a.name}">${a.name}</option>`;

    // Get the balance as it was at the END of the selected date
    const historicalBal = getHistoricalBalanceForAccount(a.name, targetDate);
    const displayBal = balancesVisible ? historicalBal.toFixed(2) : "********";

    accountTable.innerHTML += `
    <tr>
    <td>${a.name}</td>
    <td>${displayBal}</td>
    <td>
    <button onclick="editAccount('${a.id}','${a.balance}')">Edit</button>
    <button onclick="deleteAccount('${a.id}')">Delete</button>
    </td>
    </tr>
    `;

  });

}


onSnapshot(entriesCol,snap=>{

entries=[];

snap.forEach(d=>{
entries.push({...d.data(),id:d.id});
});

render();
renderAccounts(); // re-render accounts so historical balances update too
calculateBalances();

});


onSnapshot(deletedCol,snap=>{

deletedEntries=[];

snap.forEach(d=>{
deletedEntries.push(d.data());
});

});


onSnapshot(editedCol,snap=>{

editedEntries=[];

snap.forEach(d=>{
editedEntries.push(d.data());
});

});


// RENDER TABLE

function render(){

tableBody.innerHTML="";

if(viewMode==="entries"){

viewTitle.innerText="Entries";

entries.forEach(e=>{

if(e.date===filterDate.value){

tableBody.innerHTML += `
<tr>
<td>${e.name}</td>
<td>${e.purpose}</td>
<td>${e.accountName}</td>
<td>${e.type==="Dr"?e.amount:""}</td>
<td>${e.type==="Cr"?e.amount:""}</td>
<td>${e.date}</td>
<td>${e.note}</td>
<td>
<button onclick="editEntry('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>
`;

}

});

calculateBalances();

}


if(viewMode==="deleted"){

viewTitle.innerText="Deleted Entries";

deletedEntries.forEach(d=>{

if(d.date===filterDate.value){

tableBody.innerHTML += `
<tr>
<td>${d.name}</td>
<td>${d.purpose}</td>
<td>${d.accountName||""}</td>
<td>${d.type==="Dr"?d.amount:""}</td>
<td>${d.type==="Cr"?d.amount:""}</td>
<td>${d.date}</td>
<td>${d.note||""}</td>
<td></td>
</tr>
`;

}

});

}


if(viewMode==="edited"){

viewTitle.innerText="Edited Entries";

editedEntries.forEach(e=>{

if(e.date===filterDate.value){

tableBody.innerHTML += `
<tr>
<td>${e.name}</td>
<td>Before ${e.before}</td>
<td>${e.accountName||""}</td>
<td></td>
<td>After ${e.after}</td>
<td>${e.date}</td>
<td></td>
<td></td>
</tr>
`;

}

});

}

}


// DELETE ENTRY

window.deleteEntry = async(id)=>{

if(!confirm("Warning: delete entry?")) return;

const ref = doc(db,"entries",id);
const snap = await getDoc(ref);
const data = snap.data();

await addDoc(deletedCol,data);

await updateAccountBalance(
data.accountName,
data.type==="Dr" ? "Cr":"Dr",
data.amount
);

await deleteDoc(ref);

};


// EDIT ENTRY

window.editEntry = async(id)=>{

const ref = doc(db,"entries",id);
const snap = await getDoc(ref);
const old = snap.data();

let newAmt = prompt("New Amount",old.amount);
if(!newAmt) return;

await updateAccountBalance(old.accountName,old.type==="Dr"?"Cr":"Dr",old.amount);
await updateAccountBalance(old.accountName,old.type,newAmt);

await addDoc(editedCol,{
name:old.name,
before:old.amount,
after:newAmt,
date:old.date
});

await updateDoc(ref,{
amount:Number(newAmt)||0
});

};


// ACCOUNT EDIT

window.editAccount = async(id,currentBalance)=>{

let pass = prompt("Enter Password");

if(pass!==PASSWORD){
alert("Wrong Password");
return;
}

let newBalance = prompt("New Balance",currentBalance);
if(!newBalance || isNaN(newBalance)) return;

await updateDoc(doc(db,"accounts",id),{
balance:Number(newBalance)
});

};


// ACCOUNT DELETE

window.deleteAccount = async(id)=>{

let pass = prompt("Enter Password");

if(pass!==PASSWORD){
alert("Wrong Password");
return;
}

if(!confirm("Delete account?")) return;

await deleteDoc(doc(db,"accounts",id));

};


// BUTTONS

todayBtn.onclick = ()=>{
viewMode="entries";
filterDate.value=today();
render();
renderAccounts();
calculateBalances();
};

showDeletedBtn.onclick = ()=>{
viewMode="deleted";
render();
};

showEditedBtn.onclick = ()=>{
viewMode="edited";
render();
};

filterDate.onchange = ()=>{
render();
renderAccounts();   // ← re-render accounts with historical balances on date change
calculateBalances();
};

</script>

</body>
</html>
