<!DOCTYPE html>
<html>
<head>
  <title>Daybook | MG</title>
  <style>
    body{
      margin:0;
      font-family:Segoe UI;
      background:#eef2f7;
    }

    .container{
      max-width:1200px;
      margin:40px auto;
      padding:20px;
    }

    .card{
      background:#fff;
      padding:20px;
      border-radius:10px;
      margin-bottom:25px;
      box-shadow:0 3px 10px rgba(0,0,0,0.06);
    }

    h2,h3{margin-top:0;}

    input,select{
      width:100%;
      padding:8px;
      margin-bottom:10px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button{
      padding:7px 14px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-right:5px;
      color:white;
    }

    .blue{background:#1d72f3;}
    .green{background:#28a745;}
    .red{background:#dc3545;}
    .grey{background:#6c757d;}

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    th{
      background:#1d72f3;
      color:white;
      padding:8px;
    }

    td{
      padding:8px;
      border-bottom:1px solid #eee;
      text-align:center;
    }
  </style>
</head>
<body>

<div class="container">

<h2>Daybook</h2>

<!-- CREATE ACCOUNT -->
<div class="card">
  <h3>Create Account</h3>
  <input id="accountName" placeholder="Account Name">
  <input id="openingBalance" type="number" placeholder="Opening Balance">
  <button class="blue" onclick="createAccount()">Add Account</button>
  <div id="accountsList"></div>
</div>

<!-- ADD ENTRY -->
<div class="card">
  <h3>Add Entry</h3>
  <input id="entryName" placeholder="Name">
  <input id="purpose" placeholder="Purpose">
  <input id="amount" type="number" placeholder="Amount">
  <input id="date" type="date">
  <select id="accountSelect"></select>
  <select id="type">
    <option value="Dr">Debit (Dr)</option>
    <option value="Cr">Credit (Cr)</option>
  </select>
  <button class="green" onclick="addEntry()">Add Entry</button>
</div>

<!-- VIEW -->
<div class="card">
  <h3>View Entries</h3>
  <button class="grey" onclick="viewToday()">Today</button>
  <button class="grey" onclick="viewAll()">All</button>
  <button class="red" onclick="viewDeleted()">Deleted</button>
  <div id="tableContainer"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD ACCOUNTS */
async function loadAccounts(){
  const snapshot = await getDocs(collection(db,"accounts"));
  accountSelect.innerHTML="";
  accountsList.innerHTML="";

  snapshot.forEach(d=>{
    const data=d.data();

    accountSelect.innerHTML+=
      `<option value="${d.id}">${data.name}</option>`;

    accountsList.innerHTML+=
      `<div>${data.name} - ₹${data.balance}</div>`;
  });
}

/* CREATE ACCOUNT */
window.createAccount=async function(){
  const name=accountName.value.trim();
  const balance=Number(openingBalance.value)||0;

  if(!name){
    alert("Enter account name");
    return;
  }

  await addDoc(collection(db,"accounts"),{
    name,
    balance
  });

  accountName.value="";
  openingBalance.value="";
  loadAccounts();
};

/* ADD ENTRY */
window.addEntry=async function(){
  const name=entryName.value.trim();
  const purpose=purpose.value.trim();
  const amount=Number(amount.value);
  const date=date.value;
  const accountId=accountSelect.value;
  const type=type.value;

  if(!name || !purpose || !amount || !date || !accountId){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"daybook"),{
    name,
    purpose,
    amount,
    date,
    accountId,
    type,
    deleted:false
  });

  entryName.value="";
  purpose.value="";
  amount.value="";

  viewToday();
};

/* DELETE ENTRY */
window.deleteEntry=async function(id){
  await updateDoc(doc(db,"daybook",id),{
    deleted:true
  });
  viewToday();
};

/* VIEW TODAY */
window.viewToday=async function(){
  const today=new Date().toISOString().split("T")[0];

  const q=query(
    collection(db,"daybook"),
    where("date","==",today),
    where("deleted","==",false)
  );

  const snapshot=await getDocs(q);
  render(snapshot,false);
};

/* VIEW ALL */
window.viewAll=async function(){
  const q=query(
    collection(db,"daybook"),
    where("deleted","==",false)
  );
  const snapshot=await getDocs(q);
  render(snapshot,false);
};

/* VIEW DELETED */
window.viewDeleted=async function(){
  const q=query(
    collection(db,"daybook"),
    where("deleted","==",true)
  );
  const snapshot=await getDocs(q);
  render(snapshot,true);
};

/* RENDER TABLE */
function render(snapshot,isDeleted){
  let html=`<table>
    <tr>
      <th>Name</th>
      <th>Purpose</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Type</th>
      ${!isDeleted ? "<th>Action</th>" : ""}
    </tr>`;

  snapshot.forEach(docSnap=>{
    const d=docSnap.data();

    html+=`
      <tr>
        <td>${d.name}</td>
        <td>${d.purpose}</td>
        <td>${d.amount}</td>
        <td>${d.date}</td>
        <td>${d.type}</td>
        ${!isDeleted
          ? `<td><button onclick="deleteEntry('${docSnap.id}')">Delete</button></td>`
          : ""
        }
      </tr>`;
  });

  html+="</table>";
  tableContainer.innerHTML=html;
}

loadAccounts();
viewToday();

</script>

</body>
</html>
