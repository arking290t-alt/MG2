<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#eef2f6;
}
.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}
h2{margin-bottom:15px;}

.top-grid{
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

input,select{
    padding:6px 8px;
    margin:4px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:13px;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#0d6efd;
    color:#fff;
    font-size:13px;
    cursor:pointer;
}
button:hover{background:#084298;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}
th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
th{background:#f5f5f5;}

.header-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}
</style>
</head>
<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<div class="card">
<h3>Add Account</h3>
<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>
<button id="addAccount">Add Account</button>
</div>

<div class="card">
<h3>Add Entry</h3>
<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Dr</option>
<option value="Cr">Cr</option>
</select>
<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add</button>
</div>

</div>

<div class="card">
<div class="header-row">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
<button id="showEntries">Entries</button>
<button id="showDeleted">Deleted</button>
<button id="showEdited">Edited</button>
</div>
</div>

<div class="card">
<h3 id="tableTitle">Entries</h3>
<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
  authDomain: "mg-manager-3ab66.firebaseapp.com",
  projectId: "mg-manager-3ab66"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.addEventListener("DOMContentLoaded", ()=>{

const accountsCol = collection(db,"accounts");
const entriesCol = collection(db,"entries");
const deletedCol = collection(db,"deletedEntries");
const editedCol = collection(db,"editedEntries");

const accountName = document.getElementById("accountName");
const accountAmount = document.getElementById("accountAmount");
const addAccountBtn = document.getElementById("addAccount");

const entryName = document.getElementById("entryName");
const purpose = document.getElementById("purpose");
const amount = document.getElementById("amount");
const date = document.getElementById("date");
const accountSelect = document.getElementById("accountSelect");
const type = document.getElementById("type");
const note = document.getElementById("note");
const addEntryBtn = document.getElementById("addEntry");

const filterDate = document.getElementById("filterDate");
const todayBtn = document.getElementById("todayBtn");
const showEntriesBtn = document.getElementById("showEntries");
const showDeletedBtn = document.getElementById("showDeleted");
const showEditedBtn = document.getElementById("showEdited");

const tableHead = document.getElementById("tableHead");
const tableBody = document.getElementById("tableBody");
const tableTitle = document.getElementById("tableTitle");

let accounts=[];
let entries=[];
let deletedEntries=[];
let editedEntries=[];
let mode="entries";

function today(){
    return new Date().toISOString().split("T")[0];
}

date.value = today();
filterDate.value = today();

addAccountBtn.addEventListener("click", async ()=>{
    if(!accountName.value || !accountAmount.value) return;
    await addDoc(accountsCol,{
        name:accountName.value,
        balance:parseFloat(accountAmount.value)
    });
    accountName.value="";
    accountAmount.value="";
});

addEntryBtn.addEventListener("click", async ()=>{
    if(date.value !== today()){
        alert("Cannot add entry to past date");
        return;
    }

    if(!entryName.value || !amount.value) return;

    const acc = accounts[accountSelect.value];
    let newBalance = acc.balance;

    if(type.value==="Dr") newBalance -= parseFloat(amount.value);
    else newBalance += parseFloat(amount.value);

    await updateDoc(doc(db,"accounts",acc.id),{balance:newBalance});

    await addDoc(entriesCol,{
        name:entryName.value,
        purpose:purpose.value,
        amount:parseFloat(amount.value),
        accountName:acc.name,
        type:type.value,
        date:date.value,
        note:note.value
    });

    entryName.value="";
    purpose.value="";
    amount.value="";
    note.value="";
});

todayBtn.addEventListener("click", ()=>{
    filterDate.value=today();
    render();
});

showEntriesBtn.addEventListener("click", ()=>{ mode="entries"; render(); });
showDeletedBtn.addEventListener("click", ()=>{ mode="deleted"; render(); });
showEditedBtn.addEventListener("click", ()=>{ mode="edited"; render(); });

filterDate.addEventListener("change", render);

onSnapshot(accountsCol,snap=>{
    accounts=[];
    accountSelect.innerHTML="";
    snap.forEach(d=>{
        accounts.push({...d.data(),id:d.id});
    });
    accounts.forEach((a,i)=>{
        accountSelect.innerHTML+=`<option value="${i}">${a.name}</option>`;
    });
});

onSnapshot(entriesCol,snap=>{
    entries=[];
    snap.forEach(d=>{
        entries.push({...d.data(),id:d.id});
    });
    render();
});

onSnapshot(deletedCol,snap=>{
    deletedEntries=[];
    snap.forEach(d=>{
        deletedEntries.push(d.data());
    });
});

onSnapshot(editedCol,snap=>{
    editedEntries=[];
    snap.forEach(d=>{
        editedEntries.push(d.data());
    });
});

function render(){
    tableBody.innerHTML="";
    let selectedDate=filterDate.value;

    if(mode==="entries"){
        tableTitle.innerText="Entries";
        tableHead.innerHTML=`<tr>
        <th>Name</th><th>Purpose</th><th>Account</th>
        <th>Amount</th><th>Type</th><th>Date</th>
        <th>Note</th><th>Action</th></tr>`;

        entries.filter(e=>e.date===selectedDate)
        .forEach(e=>{
            tableBody.innerHTML+=`
            <tr>
            <td>${e.name}</td>
            <td>${e.purpose}</td>
            <td>${e.accountName}</td>
            <td>${e.amount}</td>
            <td>${e.type}</td>
            <td>${e.date}</td>
            <td>${e.note}</td>
            <td>
            <button onclick="deleteEntry('${e.id}')">Delete</button>
            </td>
            </tr>`;
        });
    }
}

window.deleteEntry = async(id)=>{
    const ref = doc(db,"entries",id);
    const snap = await getDoc(ref);
    await addDoc(deletedCol,snap.data());
    await deleteDoc(ref);
};

});
</script>

</body>
</html>
