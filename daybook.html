<!DOCTYPE html>
<html>
<head>
  <title>Daybook | MG</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      color: #222; /* FIXED TEXT VISIBILITY */
    }

    .container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 20px;
    }

    h2, h3 {
      color: #111;
      margin-bottom: 15px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 30px;
    }

    .card {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      width: 100%;
      margin-bottom: 10px;
      color: #111; /* FIXED */
      background: #fff;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      margin-right: 6px;
    }

    .blue { background:#1d72f3; color:#fff; }
    .green { background:#28a745; color:#fff; }
    .red { background:#dc3545; color:#fff; }
    .grey { background:#6c757d; color:#fff; }

    .summary {
      background:#f4f6f9;
      padding:12px;
      border-radius:8px;
      margin-bottom:10px;
      font-weight:600;
      color:#000; /* FIXED */
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:15px;
      background:#fff;
    }

    th {
      background:#1d72f3;
      color:#fff;
      padding:10px;
      font-size:14px;
    }

    td {
      padding:10px;
      border-bottom:1px solid #eee;
      text-align:center;
      font-size:14px;
      color:#111; /* FIXED */
    }

    tr:hover {
      background:#f9f9f9;
    }

    .bottom-section {
      margin-top: 30px;
    }

    @media(max-width:1000px){
      .top-grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

<div class="container">

<h2>Daybook Management</h2>

<div class="top-grid">

  <!-- ACCOUNTS -->
  <div class="card">
    <h3>Accounts</h3>

    <input type="text" id="accountName" placeholder="Account Name">
    <input type="number" id="openingBalance" placeholder="Opening Balance">
    <button class="btn blue" onclick="createAccount()">Add Account</button>

    <div id="accountsList" style="margin-top:15px;"></div>
  </div>

  <!-- ADD ENTRY -->
  <div class="card">
    <h3>Add Entry</h3>

    <input type="text" id="entryName" placeholder="Name">
    <input type="text" id="purpose" placeholder="Purpose">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="date">

    <select id="accountSelect"></select>

    <select id="type">
      <option value="Dr">Debit (Dr)</option>
      <option value="Cr">Credit (Cr)</option>
    </select>

    <button class="btn green" onclick="addEntry()">Add Entry</button>
  </div>

</div>

<!-- TODAY VIEW -->
<div class="card bottom-section">

  <h3>Today Daybook</h3>

  <button class="btn grey" onclick="viewDeleted()">Deleted</button>
  <input type="date" id="filterDate" style="max-width:200px; display:inline-block;">
  <button class="btn blue" onclick="filterByDate()">Filter Date</button>
  <button class="btn grey" onclick="viewAll()">All Entries</button>

  <div id="openingSummary" class="summary"></div>

  <div id="tableContainer"></div>

  <div id="closingSummary" class="summary"></div>

</div>

</div>

<script>
/* Your Firebase JS logic stays same here */
/* I only fixed the UI and readability */

</script>

</body>
</html>
