<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daybook</title>
<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
h2{margin:5px 0;}
.container{max-width:1400px;margin:auto;}
.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    margin-bottom:20px;
}
.flex{display:flex;gap:15px;flex-wrap:wrap;align-items:center;}
input,select,button{
    padding:8px 10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{background:#0056b3;}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
th{background:#f0f2f5;}
.badge-dr{color:red;font-weight:bold;}
.badge-cr{color:green;font-weight:bold;}
.small-btn{
    padding:5px 8px;
    font-size:12px;
}
.summary-box{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}
.summary-item{
    background:#eef2ff;
    padding:15px;
    border-radius:8px;
}
.deleted-section{
    background:#fff3f3;
    padding:15px;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">

<h2>DAYBOOK</h2>

<!-- Opening Summary -->
<div class="card summary-box" id="summary"></div>

<!-- Add Account -->
<div class="card">
<h3>Add Account</h3>
<div class="flex">
<input type="text" id="accountName" placeholder="Account Name">
<input type="number" id="accountAmount" placeholder="Opening Amount">
<button onclick="addAccount()">Add Account</button>
</div>
<br>
<table id="accountTable">
<thead>
<tr>
<th>Account</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- Add Entry -->
<div class="card">
<h3>Add Entry</h3>
<div class="flex">
<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Debited (Dr)</option>
<option value="Cr">Credited (Cr)</option>
</select>
<input type="text" id="note" placeholder="Add Note">
<button onclick="addEntry()">Add Entry</button>
</div>
</div>

<!-- Filter -->
<div class="card flex">
<input type="date" id="filterDate" onchange="renderEntries()">
<button onclick="showToday()">Today</button>
<button onclick="showDeleted()">Deleted Entries</button>
</div>

<!-- Entries -->
<div class="card">
<h3>Entries</h3>
<table id="entryTable">
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Amount</th>
<th>Type</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- Deleted -->
<div class="deleted-section" id="deletedSection" style="display:none;">
<h3>Deleted Entries</h3>
<table id="deletedTable">
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];
let entries = JSON.parse(localStorage.getItem("entries")) || [];
let deletedEntries = JSON.parse(localStorage.getItem("deletedEntries")) || [];

function saveData(){
    localStorage.setItem("accounts", JSON.stringify(accounts));
    localStorage.setItem("entries", JSON.stringify(entries));
    localStorage.setItem("deletedEntries", JSON.stringify(deletedEntries));
}

function addAccount(){
    let name = accountName.value;
    let amt = parseFloat(accountAmount.value);
    if(!name || !amt) return alert("Fill all fields");
    accounts.push({name, balance:amt, opening:amt});
    saveData();
    renderAccounts();
}

function renderAccounts(){
    let tbody = document.querySelector("#accountTable tbody");
    tbody.innerHTML="";
    accountSelect.innerHTML="";
    accounts.forEach((acc,i)=>{
        tbody.innerHTML += `
        <tr>
            <td>${acc.name}</td>
            <td>${acc.balance.toFixed(2)}</td>
            <td>
                <button class="small-btn" onclick="editAccount(${i})">Edit</button>
                <button class="small-btn" onclick="deleteAccount(${i})">Delete</button>
            </td>
        </tr>`;
        accountSelect.innerHTML += `<option value="${i}">${acc.name}</option>`;
    });
    renderSummary();
}

function editAccount(i){
    let pass = prompt("Enter Password");
    if(pass !== "BNPRATHAM@8056079200") return alert("Wrong Password");
    let newAmt = prompt("Enter new balance");
    accounts[i].balance = parseFloat(newAmt);
    saveData();
    renderAccounts();
}

function deleteAccount(i){
    let pass = prompt("Enter Password");
    if(pass !== "BNPRATHAM@8056079200") return alert("Wrong Password");
    accounts.splice(i,1);
    saveData();
    renderAccounts();
}

function addEntry(){
    let entry={
        name:entryName.value,
        purpose:purpose.value,
        amount:parseFloat(amount.value),
        date:date.value,
        accountIndex:accountSelect.value,
        type:type.value,
        note:note.value
    };
    if(!entry.name||!entry.amount||!entry.date) return alert("Fill all fields");
    let acc = accounts[entry.accountIndex];
    if(entry.type=="Dr") acc.balance -= entry.amount;
    else acc.balance += entry.amount;
    entries.push(entry);
    saveData();
    renderAccounts();
    renderEntries();
}

function renderEntries(){
    let filter = filterDate.value;
    let tbody = document.querySelector("#entryTable tbody");
    tbody.innerHTML="";
    let totalDr=0,totalCr=0;
    entries.forEach((e,i)=>{
        if(filter && e.date!==filter) return;
        if(e.type=="Dr") totalDr+=e.amount;
        else totalCr+=e.amount;
        tbody.innerHTML+=`
        <tr>
            <td>${e.name}</td>
            <td>${e.purpose}</td>
            <td>${accounts[e.accountIndex]?.name}</td>
            <td>${e.amount}</td>
            <td class="${e.type=='Dr'?'badge-dr':'badge-cr'}">${e.type}</td>
            <td>${e.date}</td>
            <td>${e.note}</td>
            <td><button class="small-btn" onclick="deleteEntry(${i})">Delete</button></td>
        </tr>`;
    });
    renderSummary(totalDr,totalCr);
}

function deleteEntry(i){
    deletedEntries.push(entries[i]);
    let e=entries[i];
    let acc=accounts[e.accountIndex];
    if(e.type=="Dr") acc.balance+=e.amount;
    else acc.balance-=e.amount;
    entries.splice(i,1);
    saveData();
    renderAccounts();
    renderEntries();
}

function renderSummary(totalDr=0,totalCr=0){
    let html="";
    accounts.forEach(acc=>{
        html+=`<div class="summary-item">
        <strong>${acc.name}</strong><br>
        Opening: ${acc.opening.toFixed(2)}<br>
        Closing: ${acc.balance.toFixed(2)}
        </div>`;
    });
    html+=`<div class="summary-item">
    <strong>Total Debit:</strong> ${totalDr.toFixed(2)}<br>
    <strong>Total Credit:</strong> ${totalCr.toFixed(2)}
    </div>`;
    summary.innerHTML=html;
}

function showToday(){
    let today=new Date().toISOString().split("T")[0];
    filterDate.value=today;
    renderEntries();
}

function showDeleted(){
    deletedSection.style.display="block";
    let tbody=document.querySelector("#deletedTable tbody");
    tbody.innerHTML="";
    deletedEntries.forEach(e=>{
        tbody.innerHTML+=`
        <tr>
        <td>${e.name}</td>
        <td>${e.purpose}</td>
        <td>${e.amount}</td>
        <td>${e.date}</td>
        </tr>`;
    });
}

showToday();
renderAccounts();
renderEntries();
</script>

</body>
</html>
