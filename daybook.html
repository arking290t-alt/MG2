<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Office Daybook</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f2f4f8;
}
.container{
  width:95%;
  margin:auto;
  margin-top:20px;
}
h2{
  margin-bottom:20px;
}
.top-grid{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:20px;
}
.card{
  background:#fff;
  padding:18px;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
input,select{
  padding:8px;
  margin:6px 6px 6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#0d6efd;
  color:white;
  cursor:pointer;
  font-size:13px;
}
button:hover{
  background:#0b5ed7;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:center;
}
th{
  background:#f8f9fa;
}
.balance-row{
  margin-top:12px;
  font-weight:600;
}
#exportArea{
  position:absolute;
  left:-9999px;
  top:0;
  width:900px;
  background:white;
  padding:25px;
}
</style>
</head>

<body>

<div class="container">

<h2>OFFICE DAYBOOK</h2>

<div class="top-grid">

<!-- ACCOUNT SECTION -->
<div class="card">
<h3>Add Account</h3>

<input type="text" id="accountName" placeholder="Account Name"><br>
<input type="number" id="accountAmount" placeholder="Opening Amount"><br>
<button id="addAccount">Add Account</button>

<hr>

<h4>Accounts</h4>
<table>
<thead>
<tr>
<th>Account</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>
<tbody id="accountTable"></tbody>
</table>
</div>

<!-- ENTRY SECTION -->
<div class="card">
<h3>Add Entry</h3>

<select id="entryMode">
<option value="normal">Normal Entry</option>
<option value="transfer">Inter Account Transfer</option>
</select><br>

<input type="text" id="entryName" placeholder="Name">
<input type="text" id="purpose" placeholder="Purpose">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date"><br>

<div id="normalFields">
<select id="accountSelect"></select>
<select id="type">
<option value="Dr">Debit (Dr)</option>
<option value="Cr">Credit (Cr)</option>
</select>
</div>

<div id="transferFields" style="display:none;">
From: <select id="fromAccount"></select>
To: <select id="toAccount"></select>
</div><br>

<input type="text" id="note" placeholder="Note">
<button id="addEntry">Add Entry</button>
</div>

</div>

<!-- FILTER SECTION -->
<div class="card">
<input type="date" id="filterDate">
<button id="todayBtn">Today</button>
<button id="ssBtn">SS</button>

<div class="balance-row">
Opening Balance: <span id="openingBalance">0.00</span>
</div>
</div>

<!-- ENTRY TABLE -->
<div class="card">
<h3>Entries</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Purpose</th>
<th>Account</th>
<th>Debit</th>
<th>Credit</th>
<th>Date</th>
<th>Note</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="balance-row">
Closing Balance: <span id="closingBalance">0.00</span>
</div>
</div>

</div>

<div id="exportArea"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC6BmLTjzOHwTa2VEYa9eYkClDtS__zvTM",
authDomain:"mg-manager-3ab66.firebaseapp.com",
projectId:"mg-manager-3ab66",
storageBucket:"mg-manager-3ab66.firebasestorage.app",
messagingSenderId:"330667005987",
appId:"1:330667005987:web:95de27b6259ace9fc6b996"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const PASSWORD="BNPRATHAM@8056079200";

function today(){
return new Date().toISOString().split("T")[0];
}

function yesterday(){
let d=new Date();
d.setDate(d.getDate()-1);
return d.toISOString().split("T")[0];
}

const accountsCol=collection(db,"accounts");
const entriesCol=collection(db,"entries");
const dailyCol=collection(db,"dailySummary");

let accounts=[];
let entries=[];

const accountName=document.getElementById("accountName");
const accountAmount=document.getElementById("accountAmount");
const addAccountBtn=document.getElementById("addAccount");
const accountTable=document.getElementById("accountTable");
const accountSelect=document.getElementById("accountSelect");
const fromAccount=document.getElementById("fromAccount");
const toAccount=document.getElementById("toAccount");

const entryName=document.getElementById("entryName");
const purpose=document.getElementById("purpose");
const amount=document.getElementById("amount");
const date=document.getElementById("date");
const type=document.getElementById("type");
const note=document.getElementById("note");
const addEntryBtn=document.getElementById("addEntry");

const entryMode=document.getElementById("entryMode");
const normalFields=document.getElementById("normalFields");
const transferFields=document.getElementById("transferFields");

const filterDate=document.getElementById("filterDate");
const todayBtn=document.getElementById("todayBtn");
const tableBody=document.getElementById("tableBody");
const openingBalanceEl=document.getElementById("openingBalance");
const closingBalanceEl=document.getElementById("closingBalance");
const ssBtn=document.getElementById("ssBtn");

date.value=today();
filterDate.value=today();

entryMode.onchange=()=>{
if(entryMode.value==="transfer"){
normalFields.style.display="none";
transferFields.style.display="block";
}else{
normalFields.style.display="block";
transferFields.style.display="none";
}
};

async function ensureOpening(){
const todayRef=doc(db,"dailySummary",today());
const snap=await getDoc(todayRef);
if(!snap.exists()){
let yRef=doc(db,"dailySummary",yesterday());
let ySnap=await getDoc(yRef);
let open=0;
if(ySnap.exists()) open=ySnap.data().closing||0;
await setDoc(todayRef,{date:today(),opening:open,closing:open});
}
}

async function updateClosingBalance(){
let ref=doc(db,"dailySummary",filterDate.value);
let snap=await getDoc(ref);
if(!snap.exists()) return;

let opening=snap.data().opening||0;

let totalDr=0;
let totalCr=0;

entries.forEach(e=>{
if(e.date===filterDate.value){
if(e.type==="Dr") totalDr+=Number(e.amount)||0;
if(e.type==="Cr") totalCr+=Number(e.amount)||0;
}
});

let closing=opening+totalCr-totalDr;

await updateDoc(ref,{closing:closing});

openingBalanceEl.innerText=opening.toFixed(2);
closingBalanceEl.innerText=closing.toFixed(2);
}

addAccountBtn.onclick=async()=>{
if(!accountName.value||!accountAmount.value)return;
await addDoc(accountsCol,{
name:accountName.value,
balance:Number(accountAmount.value)||0
});
accountName.value="";
accountAmount.value="";
};

addEntryBtn.onclick=async()=>{
if(!amount.value) return;

await ensureOpening();

let amt=Number(amount.value)||0;

if(entryMode.value==="normal"){

await addDoc(entriesCol,{
name:entryName.value,
purpose:purpose.value,
amount:amt,
accountName:accountSelect.value,
type:type.value,
date:date.value,
note:note.value
});

}else{

if(fromAccount.value===toAccount.value){
alert("Accounts cannot be same");
return;
}

await addDoc(entriesCol,{
name:entryName.value,
purpose:"Transfer to "+toAccount.value,
amount:amt,
accountName:fromAccount.value,
type:"Dr",
date:date.value,
note:note.value
});

await addDoc(entriesCol,{
name:entryName.value,
purpose:"Transfer from "+fromAccount.value,
amount:amt,
accountName:toAccount.value,
type:"Cr",
date:date.value,
note:note.value
});
}

entryName.value="";
purpose.value="";
amount.value="";
note.value="";
};

onSnapshot(accountsCol,snap=>{
accounts=[];
accountTable.innerHTML="";
accountSelect.innerHTML="";
fromAccount.innerHTML="";
toAccount.innerHTML="";
snap.forEach(doc=>{
accounts.push({...doc.data(),id:doc.id});
});
accounts.forEach(a=>{
accountSelect.innerHTML+=`<option value="${a.name}">${a.name}</option>`;
fromAccount.innerHTML+=`<option value="${a.name}">${a.name}</option>`;
toAccount.innerHTML+=`<option value="${a.name}">${a.name}</option>`;
accountTable.innerHTML+=`
<tr>
<td>${a.name}</td>
<td>${a.balance.toFixed(2)}</td>
<td>
<button onclick="editAccount('${a.id}','${a.name}')">Edit</button>
<button onclick="deleteAccount('${a.id}')">Delete</button>
</td>
</tr>`;
});
});

onSnapshot(entriesCol,snap=>{
entries=[];
snap.forEach(doc=>{
entries.push({...doc.data(),id:doc.id});
});
renderEntries();
});

function renderEntries(){
tableBody.innerHTML="";
entries.forEach(e=>{
if(e.date===filterDate.value){
tableBody.innerHTML+=`
<tr>
<td>${e.name}</td>
<td>${e.purpose}</td>
<td>${e.accountName}</td>
<td>${e.type==="Dr"?e.amount:""}</td>
<td>${e.type==="Cr"?e.amount:""}</td>
<td>${e.date}</td>
<td>${e.note}</td>
<td>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
}
});
updateClosingBalance();
}

window.deleteEntry=async(id)=>{
await deleteDoc(doc(db,"entries",id));
};

window.editAccount=async(id,name)=>{
let pass=prompt("Enter Password");
if(pass!==PASSWORD){alert("Wrong Password");return;}
let newName=prompt("New Name",name);
if(!newName)return;
await updateDoc(doc(db,"accounts",id),{name:newName});
};

window.deleteAccount=async(id)=>{
let pass=prompt("Enter Password");
if(pass!==PASSWORD){alert("Wrong Password");return;}
await deleteDoc(doc(db,"accounts",id));
};

todayBtn.onclick=()=>{
filterDate.value=today();
renderEntries();
};

ssBtn.onclick=async()=>{
const exportArea=document.getElementById("exportArea");
exportArea.innerHTML=document.querySelector(".card:nth-of-type(3)").innerHTML;
const canvas=await html2canvas(exportArea,{scale:2});
const link=document.createElement("a");
link.download="daybook.png";
link.href=canvas.toDataURL();
link.click();
};

ensureOpening();

</script>

</body>
</html>
